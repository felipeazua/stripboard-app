                                    borderRadius:4,fontFamily:"var(--font-mono)",border:bdr,cursor:"pointer"}}>
                                  Esc. {sc.num} — {sc.name}
                                </span>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </>
              )}

            </div>
          </div>
        )}

        {/* === CALENDARIO === */}
        {tab==="calendario" && (() => {
          // Build calendar grid for current month
          const year = calMonth.getFullYear();
          const month = calMonth.getMonth();
          const firstOfMonth = new Date(year, month, 1);
          const lastOfMonth = new Date(year, month+1, 0);
          // Lun-first: getDay returns 0=Sun ... 6=Sat. We want Lun=0...Dom=6
          const firstWeekdayMonStart = (firstOfMonth.getDay() + 6) % 7;
          const totalCells = Math.ceil((firstWeekdayMonStart + lastOfMonth.getDate()) / 7) * 7;
          const startGrid = addDays(firstOfMonth, -firstWeekdayMonStart);

          const cells = [];
          for (let i=0; i<totalCells; i++) cells.push(addDays(startGrid, i));

          const todayISO = isoDate(new Date());
          const startISO = startDate;

          function jumpToStart() {
            const d = parseISODate(startDate);
            if (d) setCalMonth(new Date(d.getFullYear(), d.getMonth(), 1));
          }
          function jumpToToday() {
            const d = new Date();
            setCalMonth(new Date(d.getFullYear(), d.getMonth(), 1));
          }
          function prevMonth() { setCalMonth(new Date(year, month-1, 1)); }
          function nextMonth() { setCalMonth(new Date(year, month+1, 1)); }

          return (
            <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>

              {/* Calendar toolbar */}
              <div style={{display:"flex",alignItems:"center",padding:"12px 12px",gap:14,borderBottom:"1px solid #000",flexShrink:0,flexWrap:"wrap",background:"#0F172A"}}>
                <div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.40)",fontFamily:"var(--font-mono)",letterSpacing:1}}>INICIO DE RODAJE</div>
                  <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
                    style={{fontSize:13,padding:"4px 8px",background:"#1E293B",border:"0.5px solid rgba(255,255,255,0.22)",borderRadius:"var(--r-md)",color:"rgba(255,255,255,0.85)",outline:"none",fontFamily:"var(--font-sans)",colorScheme:"dark"}}/>
                </div>
                <div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.40)",fontFamily:"var(--font-mono)",letterSpacing:1}}>DÍAS DE RODAJE</div>
                  <div style={{fontSize:14,fontWeight:500,color:"rgba(255,255,255,0.90)",fontFamily:"var(--font-mono)"}}>
                    {Object.values(stripDates).filter(d=>d.dayNumber).length}
                  </div>
                </div>
                <div style={{flex:1}}/>
                <button onClick={jumpToToday} style={{fontSize:12,padding:"5px 10px",cursor:"pointer",background:"#1E293B",border:"0.5px solid rgba(255,255,255,0.22)",borderRadius:"var(--r-md)",color:"rgba(255,255,255,0.80)"}}>Hoy</button>
                {startDate && <button onClick={jumpToStart} style={{fontSize:12,padding:"5px 10px",cursor:"pointer",background:"#1E293B",border:"0.5px solid rgba(255,255,255,0.22)",borderRadius:"var(--r-md)",color:"rgba(255,255,255,0.80)"}}>Ir al inicio</button>}
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <button onClick={prevMonth} title="Mes anterior"
                    style={{width:28,height:28,background:"#1E293B",border:"0.5px solid rgba(255,255,255,0.22)",borderRadius:"var(--r-md)",color:"rgba(255,255,255,0.80)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>⟨</button>
                  <span style={{fontSize:14,fontWeight:500,color:"rgba(255,255,255,0.90)",minWidth:140,textAlign:"center"}}>
                    {MONTH_NAMES[month]} {year}
                  </span>
                  <button onClick={nextMonth} title="Mes siguiente"
                    style={{width:28,height:28,background:"#1E293B",border:"0.5px solid rgba(255,255,255,0.22)",borderRadius:"var(--r-md)",color:"rgba(255,255,255,0.80)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>⟩</button>
                </div>
                {notice && <span style={{fontSize:11,color:"#6ee7a0",fontFamily:"var(--font-mono)",marginLeft:6}}>{notice}</span>}
              </div>

              {/* Settings panel + grid */}
              <div style={{flex:1,overflowY:"auto",padding:"16px 20px",background:"var(--bg-3)"}}>

                {/* Settings card */}
                <div style={{background:"var(--bg-1)",border:bdrSec,borderRadius:"var(--r-lg)",padding:"14px 18px",marginBottom:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>

                  {/* Weekly days off */}
                  <div>
                    <div style={{fontSize:11,color:"var(--t-2)",fontFamily:"var(--font-mono)",letterSpacing:1,marginBottom:8}}>DÍAS LIBRES SEMANALES</div>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                      {[1,2,3,4,5,6,0].map(idx => {
                        const checked = weeklyDaysOff.includes(idx);
                        return (
                          <button key={idx} onClick={()=>toggleWeeklyDayOff(idx)}
                            style={{
                              padding:"6px 12px",fontSize:12,cursor:"pointer",
                              background: checked ? "var(--bg-danger)" : "var(--bg-2)",
                              color: checked ? "var(--t-danger)" : "var(--t-2)",
                              border: checked ? `1px solid var(--t-danger)` : bdrSec,
                              borderRadius:"var(--r-md)",fontFamily:"var(--font-mono)",fontWeight: checked?600:400
                            }}>
                            {DAY_NAMES_SHORT[idx]}
                          </button>
                        );
                      })}
                    </div>
                    <div style={{fontSize:11,color:"var(--t-3)",marginTop:8}}>
                      Estos días no se cuentan como rodaje (las fechas los saltarán)
                    </div>
                  </div>

                  {/* Holidays */}
                  <div>
                    <div style={{fontSize:11,color:"var(--t-2)",fontFamily:"var(--font-mono)",letterSpacing:1,marginBottom:8}}>FERIADOS</div>
                    <div style={{display:"flex",gap:6,marginBottom:8}}>
                      <input type="date" value={holidayDraft} onChange={e=>setHolidayDraft(e.target.value)}
                        style={{flex:1,fontSize:12,padding:"5px 8px",background:"var(--bg-2)",border:bdrSec,borderRadius:"var(--r-md)",color:"var(--t-1)",outline:"none"}}/>
                      <button onClick={()=>{ if(holidayDraft){ addHoliday(holidayDraft); setHolidayDraft(""); } }}
                        style={{...secondaryBtn,padding:"5px 12px"}}>+ Agregar</button>
                    </div>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap",maxHeight:80,overflowY:"auto"}}>
                      {holidays.length === 0 ? (
                        <span style={{fontSize:11,color:"var(--t-3)",fontStyle:"italic"}}>Sin feriados configurados</span>
                      ) : holidays.map(h => {
                        const d = parseISODate(h);
                        return (
                          <span key={h} style={{
                            background:"#FFE5C4",color:"#854F0B",fontSize:11,
                            padding:"2px 4px 2px 8px",borderRadius:4,
                            border:"1px solid #BA7517",
                            display:"inline-flex",alignItems:"center",gap:4,fontFamily:"var(--font-mono)"
                          }}>
                            {d ? formatShortDate(d) : h}
                            <span onClick={()=>removeHoliday(h)} style={{cursor:"pointer",fontSize:14,lineHeight:1,padding:"0 2px"}}>×</span>
                          </span>
                        );
                      })}
                    </div>
                  </div>
                </div>

                {!startDate && (
                  <div style={{background:"var(--bg-info)",border:`1px solid var(--t-info)`,color:"var(--t-info)",padding:"10px 14px",borderRadius:"var(--r-md)",marginBottom:14,fontSize:13}}>
                    💡 Define el <strong>día de inicio de rodaje</strong> arriba para que las fechas se asignen automáticamente a los day breaks y días libres del stripboard.
                  </div>
                )}

                {/* Two-col: boneyard left | calendar right */}
                <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>

                  {/* LEFT — Boneyard panel */}
                  {(()=>{
                    let inBone = false;
                    const boneyardScenes = board.filter(s=>{
                      if (s.type==="boneyard_sep"){inBone=true;return false;}
                      return inBone && s.type==="scene";
                    }).map(s=>scenes[s.id]).filter(Boolean);
                    return (
                      <div
                        onDragOver={calDragSceneId ? (e=>e.preventDefault()) : undefined}
                        onDrop={calDragSceneId ? (e=>{
                          e.preventDefault();
                          // Move scene to boneyard in board
                          const nb = [...board];
                          const sceneIdx = nb.findIndex(s=>s.id===calDragSceneId);
                          if (sceneIdx >= 0) {
                            const isBoundary = s=>s.type==="daybreak"||s.type==="dayoff"||s.type==="boneyard_sep"||(s.type==="banner"&&s.breaksDay);
                            // Find and possibly remove empty origin daybreak
                            let originDbId = null;
                            for (let i=sceneIdx-1;i>=0;i--) {
                              if (nb[i].type==="daybreak"||(nb[i].type==="banner"&&nb[i].breaksDay)){originDbId=nb[i].id;break;}
                            }
                            const [strip] = nb.splice(sceneIdx, 1);
                            if (originDbId) {
                              const oi = nb.findIndex(s=>s.id===originDbId);
                              if (oi>=0){let has=false;for(let i=oi+1;i<nb.length;i++){if(isBoundary(nb[i]))break;if(nb[i].type==="scene"){has=true;break;}}if(!has)nb.splice(oi,1);}
                            }
                            // Insert after boneyard_sep
                            const bsIdx = nb.findIndex(s=>s.type==="boneyard_sep");
                            nb.splice(bsIdx>=0?bsIdx+1:nb.length, 0, strip);
                            setBoard(nb);
                            notify("Escena movida al boneyard ✓");
                          }
                          setCalDragSceneId(null); setCalDragOverDate(null);
                        }) : undefined}
                        style={{width:176,flexShrink:0,background:"var(--bg-1)",border: calDragSceneId ? "1.5px dashed var(--t-3)" : bdrSec,borderRadius:"var(--r-lg)",overflow:"hidden",position:"sticky",top:0,transition:"border 0.15s"}}>
                        <div style={{padding:"8px 10px",borderBottom:bdr,background: calDragSceneId ? "var(--bg-3)" : "var(--bg-2)",fontSize:10,fontWeight:700,letterSpacing:1.5,color:"var(--t-3)",textTransform:"uppercase",transition:"background 0.15s"}}>
                          🗂 Boneyard {calDragSceneId ? "← soltar aquí" : ""}
                        </div>
                        {boneyardScenes.length===0 ? (
                          <div style={{padding:"14px 10px",fontSize:11,color:"var(--t-3)",textAlign:"center",lineHeight:1.6}}>
                            Sin escenas<br/>sin programar
                          </div>
                        ) : (
                          <div style={{padding:"6px",display:"flex",flexDirection:"column",gap:3,maxHeight:"72vh",overflowY:"auto"}}>
                            {boneyardScenes.map(sc=>{
                              const col=getCol(sc.intExt,sc.dayNight);
                              const isDragging=calDragSceneId===sc.id;
                              return (
                                <div key={sc.id} draggable
                                  onDragStart={e=>{setCalDragSceneId(sc.id);e.dataTransfer.effectAllowed="move";}}
                                  onDragEnd={()=>{setCalDragSceneId(null);setCalDragOverDate(null);}}
                                  onClick={()=>openEdit(sc.id)}
                                  title={"Esc. "+sc.num+" — "+(sc.name||"(sin nombre)")+"\nArrastrar al calendario para programar"}
                                  style={{display:"flex",alignItems:"center",gap:5,cursor:"grab",
                                    background:col.bg,color:col.text,padding:"4px 7px",borderRadius:4,
                                    fontSize:11,border:"0.5px solid rgba(0,0,0,0.12)",
                                    opacity:isDragging?0.3:1}}>
                                  <span style={{fontWeight:700,flexShrink:0}}>{sc.num}</span>
                                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:10}}>{sc.name||"(sin nombre)"}</span>
                                </div>
                              );
                            })}
                            <div style={{padding:"5px 4px",fontSize:10,color:"var(--t-3)",textAlign:"center",borderTop:bdr,marginTop:2}}>
                              arrastrá al calendario →
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })()}

                  {/* RIGHT — Calendar grid */}
                  <div style={{flex:1,minWidth:0}}>
                {/* Calendar grid */}
                <div style={{background:"var(--bg-1)",border:bdrSec,borderRadius:"var(--r-lg)",overflow:"hidden"}}>
                  {/* Day headers */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",background:"var(--bg-2)",borderBottom:bdr}}>
                    {["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"].map(d => (
                      <div key={d} style={{padding:"8px 10px",fontSize:11,fontFamily:"var(--font-mono)",letterSpacing:1,color:"var(--t-2)",textAlign:"center"}}>
                        {d}
                      </div>
                    ))}
                  </div>
                  {/* Cells */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",gridAutoRows:"minmax(110px, max-content)"}}>
                    {cells.map((date,i) => {
                      const dIso = isoDate(date);
                      const isCurMonth = date.getMonth() === month;
                      const isToday = dIso === todayISO;
                      const isStart = dIso === startISO;
                      const isHoliday = holidays.includes(dIso);
                      const isWeeklyOff = weeklyDaysOff.includes(date.getDay());
                      const activity = calendarActivity[dIso];
                      const isDragOver = calDragOverDate === dIso;
                      const canDrop = !!calDragSceneId && !isHoliday && !isWeeklyOff && activity?.type !== "dayoff";

                      let cellBg = "var(--bg-1)";
                      if (!isCurMonth) cellBg = "var(--bg-3)";
                      if (isHoliday) cellBg = "#FFE5C4";
                      else if (activity?.type === "dayoff") cellBg = "#F4E0E0";
                      else if (activity?.type === "shoot") cellBg = "#EAF5DC";
                      if (isDragOver && canDrop) cellBg = activity?.type === "shoot" ? "#D4EBA8" : "#DDEEFF";

                      return (
                        <div key={i}
                          onDragOver={canDrop ? (e=>{e.preventDefault();setCalDragOverDate(dIso);}) : undefined}
                          onDragLeave={canDrop ? (()=>setCalDragOverDate(d=>d===dIso?null:d)) : undefined}
                          onDrop={canDrop ? (e=>{
                            e.preventDefault();
                            if (calDragSceneId) moveSceneToDate(calDragSceneId, dIso);
                            setCalDragSceneId(null); setCalDragOverDate(null);
                          }) : undefined}
                          style={{
                            background:cellBg,
                            borderRight:((i%7)!==6)?bdr:"none",
                            borderBottom:bdr,
                            padding:"6px 8px",
                            minHeight:110,
                            opacity:(!isCurMonth && !canDrop) ? 0.45 : 1,
                            display:"flex",flexDirection:"column",gap:4,
                            position:"relative",
                            transition:"background 0.1s",
                            boxShadow: isDragOver && canDrop
                              ? (activity?.type==="shoot" ? "inset 0 0 0 2px var(--t-success)" : "inset 0 0 0 2px var(--t-info)")
                              : "none"
                          }}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{
                              fontSize:12,fontFamily:"var(--font-mono)",
                              color:isCurMonth?"var(--t-2)":"var(--t-3)",
                              fontWeight:isToday?700:400,
                              ...(isToday?{background:"var(--t-1)",color:"var(--bg-1)",borderRadius:"50%",width:22,height:22,display:"inline-flex",alignItems:"center",justifyContent:"center"}:{})
                            }}>{date.getDate()}</span>
                            {isStart && (
                              <span style={{fontSize:9,fontFamily:"var(--font-mono)",letterSpacing:1,color:"var(--t-info)",background:"var(--bg-info)",padding:"1px 5px",borderRadius:3}}>INICIO</span>
                            )}
                          </div>
                          {isHoliday && (
                            <div style={{fontSize:10,fontFamily:"var(--font-mono)",letterSpacing:1,color:"#854F0B",fontWeight:600}}>FERIADO</div>
                          )}
                          {isWeeklyOff && !isHoliday && !activity && (
                            <div style={{fontSize:10,fontFamily:"var(--font-mono)",letterSpacing:1,color:"var(--t-3)"}}>
                              {DAY_NAMES_LONG[date.getDay()].toUpperCase()}
                            </div>
                          )}
                          {activity && activity.type === "shoot" && (
                            <>
                              <div style={{fontSize:10,fontFamily:"var(--font-mono)",letterSpacing:1,color:"#3B6D11",fontWeight:700}}>
                                DÍA {activity.dayNumber} · {activity.scenes.length} esc
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                                {activity.scenes.map(sc => {
                                  const col = getCol(sc.intExt, sc.dayNight);
                                  const isDragging = calDragSceneId === sc.id;
                                  return (
                                    <div key={sc.id} draggable
                                      onDragStart={e=>{setCalDragSceneId(sc.id);e.dataTransfer.effectAllowed="move";}}
                                      onDragEnd={()=>{setCalDragSceneId(null);setCalDragOverDate(null);}}
                                      onClick={()=>openEdit(sc.id)}
                                      title={"Esc. "+sc.num+" — "+sc.name+"\nClick: abrir desglose · Arrastrar: mover a otro día"}
                                      style={{display:"flex",gap:4,alignItems:"center",cursor:"grab",
                                        background:col.bg,color:col.text,padding:"2px 5px",borderRadius:3,
                                        fontSize:10,opacity:isDragging?0.4:1,
                                        whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                                        border:"0.5px solid rgba(0,0,0,0.12)"}}>
                                      <span style={{fontWeight:700,fontFamily:"var(--font-mono)",flexShrink:0}}>{sc.num}</span>
                                      <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{sc.name||("(sin nombre)")}</span>
                                    </div>
                                  );
                                })}
                              </div>
                            </>
                          )}
                          {activity && activity.type === "dayoff" && (
                            <div style={{fontSize:10,fontFamily:"var(--font-mono)",letterSpacing:1,color:"#7A2222",fontWeight:600}}>
                              {activity.label || "DÍA LIBRE"}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div style={{height:20}}/>
                  </div>{/* end RIGHT */}
                </div>{/* end two-col */}
              </div>
            </div>
          );
        })()}
      </div>

      {/* CONTEXT MENU */}
      {contextMenu && (
        <div onClick={e=>e.stopPropagation()}
          style={{position:"fixed",left:Math.min(contextMenu.x, window.innerWidth-220), top:Math.min(contextMenu.y, window.innerHeight-280),zIndex:60,background:"var(--bg-1)",border:bdrSec,borderRadius:"var(--r-md)",boxShadow:"0 8px 30px rgba(0,0,0,0.18)",minWidth:200,padding:"4px 0"}}>
          <div className="ctx-item" onClick={()=>{ addDaybreakAt(contextMenu.stripIdx); setContextMenu(null); }}>
            <span style={{fontSize:14}}>📅</span> Agregar day break aquí
          </div>
          <div className="ctx-item" onClick={()=>{ addDayoffAt(contextMenu.stripIdx); setContextMenu(null); }}>
            <span style={{fontSize:14}}>⊘</span> Agregar día libre aquí
          </div>
          <div className="ctx-item" onClick={()=>{ openBannerModalAt(contextMenu.stripIdx); setContextMenu(null); }}>
            <span style={{fontSize:14}}>🚩</span> Agregar banner aquí
          </div>
          {contextMenu.stripType === "scene" && <>
            <div className="ctx-divider"/>
            <div className="ctx-item" onClick={()=>{ openEdit(contextMenu.stripId); setContextMenu(null); }}>
              <span style={{fontSize:14}}>✏</span> Editar escena (desglose)
            </div>
            {!isInBoneyard(contextMenu.stripId) && (
              <div className="ctx-item" onClick={()=>{ moveToBoneyard(contextMenu.stripId); setContextMenu(null); }}>
                <span style={{fontSize:14}}>🗂</span> Mover al boneyard
              </div>
            )}
          </>}
          {contextMenu.stripType === "banner" && <>
            <div className="ctx-divider"/>
            <div className="ctx-item" onClick={()=>{ openBannerEdit(contextMenu.stripId); setContextMenu(null); }}>
              <span style={{fontSize:14}}>✏</span> Editar banner
            </div>
          </>}
          {(contextMenu.stripType === "daybreak" || contextMenu.stripType === "dayoff" || contextMenu.stripType === "banner") && <>
            <div className="ctx-divider"/>
            <div className="ctx-item danger" onClick={()=>{ rmStrip(null,contextMenu.stripId); setContextMenu(null); }}>
              <span style={{fontSize:14}}>🗑</span> Eliminar
            </div>
          </>}
        </div>
      )}

      {/* BANNER MODAL */}
      {showBannerModal && (() => {
        const selectedType = BANNER_TYPES.find(t => t.id === bannerForm.type) || BANNER_TYPES[0];
        const allowsCustomText = selectedType.id === "other" || selectedType.id === "section";
        const isDecorative = !!bannerForm.decorative;
        const previewLabel = allowsCustomText
          ? (bannerForm.customLabel.trim() || (selectedType.id === "section" ? "TÍTULO" : "BANNER"))
          : selectedType.label.toUpperCase();
        return (
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",zIndex:55,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:60,overflowY:"auto"}}
          onClick={()=>setShowBannerModal(null)}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:"var(--bg-1)",width:480,maxWidth:"calc(100% - 32px)",borderRadius:"var(--r-lg)",border:bdrSec,boxShadow:"0 8px 40px rgba(0,0,0,0.2)",overflow:"hidden",marginBottom:40}}>
            <div style={{padding:"14px 20px",borderBottom:bdr,background:"var(--bg-2)",display:"flex",alignItems:"center"}}>
              <h2 style={{margin:0,fontSize:16,fontWeight:500}}>{showBannerModal.editId ? "Editar banner" : "Nuevo banner"}</h2>
              <div style={{flex:1}}/>
              <button onClick={()=>setShowBannerModal(null)} style={{background:"none",border:"none",color:"var(--t-3)",cursor:"pointer",fontSize:22,lineHeight:1,padding:"0 4px"}}>×</button>
            </div>
            <div style={{padding:20,display:"flex",flexDirection:"column",gap:14}}>

              {/* Banner type grid */}
              <div>
                <label style={labelSt}>TIPO DE BANNER</label>
                <div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:6}}>
                  {BANNER_TYPES.map(t => {
                    const sel = bannerForm.type === t.id;
                    return (
                      <div key={t.id} onClick={()=>setBannerForm({
                        ...bannerForm,
                        type: t.id,
                        breaksDay: t.defaultBreaks,
                        duration: t.defaultDuration,
                        decorative: t.defaultDecorative
                      })}
                        style={{
                          padding:"10px 12px",borderRadius:6,cursor:"pointer",fontSize:13,
                          background: sel ? "var(--t-1)" : "var(--bg-2)",
                          color: sel ? "var(--bg-1)" : "var(--t-1)",
                          border: sel ? "1px solid var(--t-1)" : bdrSec,
                          fontWeight: sel ? 600 : 400,
                          textAlign:"center"
                        }}>
                        {t.label}
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Custom text for "Otro" and "Sección" */}
              {allowsCustomText && (
                <div>
                  <label style={labelSt}>TEXTO DEL BANNER</label>
                  <input value={bannerForm.customLabel}
                    onChange={e=>setBannerForm({...bannerForm,customLabel:e.target.value})}
                    placeholder={selectedType.id === "section" ? "ej: PLAN DE RODAJE v1.0, BLOQUE 1 — EXTERIORES..." : "Escribe el texto del banner..."}
                    style={inputSt} autoFocus/>
                </div>
              )}

              {/* Decorative toggle */}
              <div style={{
                background: isDecorative ? "var(--bg-info)" : "var(--bg-2)",
                border: isDecorative ? `1px solid var(--t-info)` : bdrSec,
                borderRadius:"var(--r-md)",padding:"10px 12px",
                display:"flex",alignItems:"center",gap:10,cursor:"pointer"
              }}
              onClick={()=>setBannerForm({...bannerForm,decorative:!isDecorative})}>
                <input type="checkbox" checked={isDecorative}
                  onChange={e=>setBannerForm({...bannerForm,decorative:e.target.checked})}
                  style={{cursor:"pointer",width:16,height:16}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:500,color:isDecorative?"var(--t-info)":"var(--t-1)"}}>
                    Solo título / decorativo
                  </div>
                  <div style={{fontSize:11,color:"var(--t-3)",marginTop:2}}>
                    {isDecorative
                      ? "Es un letrero visual sin afectar el horario ni la jornada (ej. Plan de Rodaje v1.0)."
                      : "Es una actividad real con tiempo (afecta el horario)."}
                  </div>
                </div>
              </div>

              {/* Day break toggle (hidden when decorative) */}
              {!isDecorative && (
                <div style={{
                  background: bannerForm.breaksDay ? "var(--bg-warn)" : "var(--bg-2)",
                  border: bannerForm.breaksDay ? `1px solid var(--t-warn)` : bdrSec,
                  borderRadius:"var(--r-md)",padding:"10px 12px",
                  display:"flex",alignItems:"center",gap:10,cursor:"pointer"
                }}
                onClick={()=>setBannerForm({...bannerForm,breaksDay:!bannerForm.breaksDay})}>
                  <input type="checkbox" checked={bannerForm.breaksDay}
                    onChange={e=>setBannerForm({...bannerForm,breaksDay:e.target.checked})}
                    style={{cursor:"pointer",width:16,height:16}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:500,color:bannerForm.breaksDay?"var(--t-warn)":"var(--t-1)"}}>
                      ¿Implica cambio de día?
                    </div>
                    <div style={{fontSize:11,color:"var(--t-3)",marginTop:2}}>
                      {bannerForm.breaksDay
                        ? "Se comportará como day break: cierra la jornada y comienza una nueva."
                        : "Quedará dentro de la misma jornada."}
                    </div>
                  </div>
                </div>
              )}

              {/* Duration (hidden when decorative) */}
              {!isDecorative && (
                <div>
                  <label style={labelSt}>DURACIÓN <span style={{color:"var(--t-3)",fontWeight:400,letterSpacing:0,textTransform:"none"}}>(minutos — 0 para ignorar el tiempo)</span></label>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <input type="number" min="0" value={bannerForm.duration}
                      onChange={e=>setBannerForm({...bannerForm,duration:e.target.value})}
                      placeholder="0"
                      style={{...inputSt,width:100,textAlign:"center"}}/>
                    <span style={{fontSize:12,color:"var(--t-3)",fontFamily:"var(--font-mono)"}}>min</span>
                    <span style={{fontSize:11,color:"var(--t-3)",marginLeft:8}}>
                      {(parseInt(bannerForm.duration)||0) > 0
                        ? "Las escenas siguientes empezarán después de este tiempo."
                        : "Las escenas siguientes seguirán sin pausa."}
                    </span>
                  </div>
                </div>
              )}

              {/* Preview */}
              <div>
                <label style={labelSt}>VISTA PREVIA</label>
                <div style={{background:BANNER_STYLE.bg,color:BANNER_STYLE.text,padding:"8px 14px",borderRadius:4,fontFamily:"var(--font-sans)",fontWeight:700,fontSize:12,letterSpacing:1,textAlign:"center"}}>
                  — {previewLabel} —
                </div>
              </div>

              <div style={{display:"flex",gap:8,marginTop:6}}>
                <div style={{flex:1}}/>
                <button onClick={()=>setShowBannerModal(null)} style={secondaryBtn}>Cancelar</button>
                <button onClick={saveBanner} style={primaryBtn}>{showBannerModal.editId ? "Guardar cambios" : "Agregar banner"}</button>
              </div>
            </div>
          </div>
        </div>
        );
      })()}

      {/* VERSIONS MODAL */}
      {showVersionsModal && (
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",zIndex:55,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:60,overflowY:"auto"}}
          onClick={()=>setShowVersionsModal(false)}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:"var(--bg-1)",width:580,maxWidth:"calc(100% - 32px)",borderRadius:"var(--r-lg)",border:bdrSec,boxShadow:"0 8px 40px rgba(0,0,0,0.2)",overflow:"hidden",marginBottom:40}}>

            {/* Modal header */}
            <div style={{padding:"14px 20px",borderBottom:bdr,background:"var(--bg-2)",display:"flex",alignItems:"center",gap:10}}>
              <div>
                <h2 style={{margin:0,fontSize:15,fontWeight:600}}>Versiones del plan de rodaje</h2>
                <div style={{fontSize:11,color:"var(--t-3)",marginTop:2}}>{project} · {versions.length} versión{versions.length!==1?"es":""} · las escenas y el desglose son compartidos</div>
              </div>
              <div style={{flex:1}}/>
              <button onClick={()=>setShowVersionsModal(false)} style={{background:"none",border:"none",color:"var(--t-3)",cursor:"pointer",fontSize:22,lineHeight:1,padding:"0 4px"}}>×</button>
            </div>

            {/* Actions bar */}
            <div style={{padding:"10px 20px",borderBottom:bdr,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <button onClick={newVersion} style={primaryBtn}>+ Nueva versión</button>
              <span style={{fontSize:11,color:"var(--t-3)",marginLeft:4}}>Podés empezar con board vacío o copiar el plan actual.</span>
            </div>

            {/* Version list */}
            <div style={{padding:"12px 20px 20px",maxHeight:"60vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
              {versions.map((v, idx) => {
                const isActive = v.id === activeVersionId;
                const scenesInPlan = (v.board||[]).filter(s=>s.type==="scene").length;
                const dayCount = (v.board||[]).filter(s=>s.type==="daybreak").length;
                const updated = v.updatedAt ? new Date(v.updatedAt).toLocaleString("es-CL",{dateStyle:"short",timeStyle:"short"}) : "—";
                return (
                  <div key={v.id} style={{
                    display:"flex",alignItems:"center",gap:10,padding:"12px 14px",
                    background: isActive ? "var(--bg-info)" : "var(--bg-2)",
                    border: isActive ? `1px solid var(--t-info)` : bdr,
                    borderRadius:"var(--r-md)"
                  }}>
                    {/* Left: index badge */}
                    <div style={{
                      width:28,height:28,borderRadius:6,flexShrink:0,
                      background: isActive ? "var(--t-info)" : "var(--b-1)",
                      color: isActive ? "var(--bg-1)" : "var(--t-3)",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:12,fontWeight:700
                    }}>{idx+1}</div>

                    {/* Center: info */}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        <span style={{fontSize:14,fontWeight:600,color:"var(--t-1)"}}>{v.name}</span>
                        {isActive && (
                          <span style={{fontSize:10,padding:"1px 8px",background:"var(--t-info)",color:"var(--bg-1)",borderRadius:10,fontWeight:700,letterSpacing:0.5}}>
                            ACTIVA
                          </span>
                        )}
                      </div>
                      <div style={{fontSize:11,color:"var(--t-3)",marginTop:3,display:"flex",gap:10,flexWrap:"wrap"}}>
                        <span>{scenesInPlan} escena{scenesInPlan!==1?"s":""} en plan</span>
                        <span>·</span>
                        <span>{dayCount} jornada{dayCount!==1?"s":""}</span>
                        {v.startDate && <><span>·</span><span>inicio: {v.startDate}</span></>}
                        <span>·</span>
                        <span>editado {updated}</span>
                      </div>
                    </div>

                    {/* Actions */}
                    <div style={{display:"flex",gap:4,flexShrink:0}}>
                      {!isActive && (
                        <button onClick={()=>switchToVersion(v.id)}
                          style={{...secondaryBtn,padding:"5px 12px",fontSize:12,color:"var(--t-info)",borderColor:"var(--t-info)"}}>
                          Activar
                        </button>
                      )}
                      <button onClick={()=>renameVersion(v.id)} className="icon-btn" title="Renombrar" style={{width:28,height:28}}>✏</button>
                      <button onClick={()=>duplicateVersion(v.id)} className="icon-btn" title="Duplicar esta versión" style={{width:28,height:28}}>⧉</button>
                      <button onClick={()=>deleteVersion(v.id)} className="icon-btn" title="Eliminar"
                        style={{width:28,height:28,color:"var(--t-danger)"}}>🗑</button>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Footer tip */}
            <div style={{padding:"10px 20px",borderTop:bdr,background:"var(--bg-2)",fontSize:11,color:"var(--t-3)"}}>
              💡 Cada versión tiene su propio board y calendario. Las escenas y el desglose son iguales en todas.
            </div>
          </div>
        </div>
      )}

      {/* PROJECTS MODAL */}
      {showProjectsModal && (
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",zIndex:55,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:60,overflowY:"auto"}}
          onClick={()=>setShowProjectsModal(false)}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:"var(--bg-1)",width:560,maxWidth:"calc(100% - 32px)",borderRadius:"var(--r-lg)",border:bdrSec,boxShadow:"0 8px 40px rgba(0,0,0,0.2)",overflow:"hidden",marginBottom:40}}>
            <div style={{padding:"14px 20px",borderBottom:bdr,background:"var(--bg-2)",display:"flex",alignItems:"center"}}>
              <h2 style={{margin:0,fontSize:16,fontWeight:500}}>📁 Mis proyectos</h2>
              <div style={{flex:1}}/>
              <button onClick={()=>setShowProjectsModal(false)} style={{background:"none",border:"none",color:"var(--t-3)",cursor:"pointer",fontSize:22,lineHeight:1,padding:"0 4px"}}>×</button>
            </div>
            <div style={{padding:"12px 20px",borderBottom:bdr,display:"flex",gap:8,flexWrap:"wrap"}}>
              <button onClick={newProject} style={primaryBtn}>+ Nuevo proyecto</button>
              <label style={{...secondaryBtn,display:"inline-flex",alignItems:"center",gap:6,cursor:"pointer"}}>
                ↑ Cargar desde archivo
                <input type="file" accept=".json,application/json" onChange={importProject} style={{display:"none"}}/>
              </label>
              <div style={{flex:1}}/>
              <span style={{fontSize:11,color:"var(--t-3)",alignSelf:"center"}}>{projList.length} proyecto{projList.length!==1?"s":""}</span>
            </div>
            <div style={{padding:"12px 20px 20px",maxHeight:"60vh",overflowY:"auto"}}>
              {projList.map(p => {
                const isActive = p.id === activeId;
                const sceneCount = Object.keys(p.scenes||{}).length;
                const versionCount = (p.versions||[]).length;
                const updated = p.updatedAt ? new Date(p.updatedAt).toLocaleString() : "—";
                return (
                  <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
                    background: isActive ? "var(--bg-info)" : "var(--bg-2)",
                    border: isActive ? `1px solid var(--t-info)` : bdr,
                    borderRadius:"var(--r-md)",marginBottom:6}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:500,color:"var(--t-1)",display:"flex",alignItems:"center",gap:8}}>
                        {p.name}
                        {isActive && <span style={{fontSize:10,padding:"1px 7px",background:"var(--t-info)",color:"var(--bg-1)",borderRadius:10,letterSpacing:1,fontWeight:700}}>ACTIVO</span>}
                      </div>
                      <div style={{fontSize:11,color:"var(--t-3)",marginTop:2}}>
                        {sceneCount} escena{sceneCount!==1?"s":""} · {versionCount} versión{versionCount!==1?"es":""} · actualizado {updated}
                      </div>
                    </div>
                    {!isActive && <button onClick={()=>switchToProject(p.id)} style={{...secondaryBtn,padding:"5px 10px"}}>Abrir</button>}
                    <button onClick={()=>renameProject(p.id)} className="icon-btn" title="Renombrar" style={{width:28,height:28}}>✏</button>
                    <button onClick={()=>duplicateProject(p.id)} className="icon-btn" title="Duplicar" style={{width:28,height:28}}>⧉</button>
                    <button onClick={()=>deleteProjectById(p.id)} className="icon-btn" title="Eliminar"
                      style={{width:28,height:28,color:"var(--t-danger)"}}>🗑</button>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
      {/* FDX IMPORT PREVIEW MODAL */}
      {fdxImportState === "preview" && (
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.65)",zIndex:80,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:40,overflowY:"auto"}}
          onClick={()=>setFdxImportState(null)}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:"var(--bg-1)",width:680,maxWidth:"calc(100% - 32px)",borderRadius:"var(--r-lg)",border:bdrSec,boxShadow:"0 12px 50px rgba(0,0,0,0.3)",overflow:"hidden",marginBottom:40}}>

            {/* Header */}
            <div style={{padding:"14px 20px",borderBottom:bdr,background:"var(--bg-2)",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>📄</span>
              <div style={{flex:1}}>
                <h2 style={{margin:0,fontSize:16,fontWeight:600}}>Importar guion Final Draft</h2>
                <div style={{fontSize:12,color:"var(--t-3)",marginTop:2}}>
                  Se detectaron <strong>{fdxScenes.length}</strong> escenas — revisá antes de confirmar
                </div>
              </div>
              <button onClick={()=>setFdxImportState(null)} style={{background:"none",border:"none",color:"var(--t-3)",cursor:"pointer",fontSize:22,lineHeight:1,padding:"0 4px"}}>×</button>
            </div>

            {/* Scene preview list */}
            <div style={{maxHeight:"50vh",overflowY:"auto",padding:"10px 16px",display:"flex",flexDirection:"column",gap:4}}>
              {fdxScenes.map((sc, i) => {
                const col = getCol(sc.intExt, sc.dayNight);
                return (
                  <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 10px",
                    background:"var(--bg-2)",borderRadius:6,border:bdrSec}}>
                    <div style={{width:32,height:32,borderRadius:4,background:col.bg,color:col.text,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:11,fontWeight:700,fontFamily:"var(--font-mono)",flexShrink:0}}>
                      {sc.num}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                        <span style={{fontSize:12,fontWeight:600,fontFamily:"var(--font-mono)",color:"var(--t-1)"}}>
                          {sc._rawHeading || `${sc.intExt}. ${sc.location}${sc.set ? ` / ${sc.set}` : ""}`}
                        </span>
                        {sc.cast.length > 0 && (
                          <span style={{fontSize:10,color:"var(--t-info)",background:"var(--bg-info)",borderRadius:10,padding:"1px 7px"}}>
                            {sc.cast.slice(0,3).join(", ")}{sc.cast.length > 3 ? ` +${sc.cast.length-3}` : ""}
                          </span>
                        )}
                        {sc.pages && (
                          <span style={{fontSize:10,color:"var(--t-3)",fontFamily:"var(--font-mono)"}}>
                            {sc.pages} pág.
                          </span>
                        )}
                      </div>
                      {sc.name && (
                        <div style={{fontSize:11,color:"var(--t-3)",marginTop:3,fontFamily:"var(--font-mono)",
                          whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                          {sc.name}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Footer actions */}
            <div style={{padding:"14px 20px",borderTop:bdr,background:"var(--bg-2)",display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:"var(--t-3)",lineHeight:1.5}}>
                  <strong style={{color:"var(--t-2)"}}>Reemplazar:</strong> borra todas las escenas actuales y carga las del guion.<br/>
                  <strong style={{color:"var(--t-2)"}}>Agregar:</strong> suma las escenas nuevas al boneyard sin tocar las existentes.
                </div>
              </div>
              <button onClick={()=>setFdxImportState(null)} style={{...secondaryBtn}}>Cancelar</button>
              <button onClick={()=>confirmFdxImport("merge")}
                style={{...secondaryBtn,borderColor:"var(--t-info)",color:"var(--t-info)"}}>
                + Agregar al proyecto
              </button>
              <button onClick={()=>confirmFdxImport("replace")}
                style={{...primaryBtn,background:"var(--t-1)",color:"var(--bg-1)"}}>
                Reemplazar todo
              </button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
