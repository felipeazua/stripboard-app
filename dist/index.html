  const timeShort = t ? t.short : "?";
  const ieShort = intExt === "INT/EXT" ? "I/E" : (intExt || "?")[0];

}

function getLabel(intExt, dayNight) {
  const t = TIME_OPTIONS.find(o => o.value === dayNight);
  return `${intExt} - ${t ? t.label : dayNight}`;
}

function getTimeIcon(dayNight) {
  switch(dayNight) {
    case "DAY": case "MORNING": case "AFTERNOON": return "☀";
    case "NIGHT": return "☽";
    case "DAWN": return "🌅";
    case "DUSK": return "🌇";
    case "MAGIC_HOUR": return "✨";
    default: return "·";
  }
}

function getCol(intExt, dayNight) {
  const abbr = getAbbr(intExt, dayNight);
  const label = getLabel(intExt, dayNight);

  // Special times — same color regardless of INT/EXT
  if (dayNight === "DAWN")       return { ...COLOR_PALETTE.PINK,   abbr, label };
  if (dayNight === "DUSK")       return { ...COLOR_PALETTE.ORANGE, abbr, label };
  if (dayNight === "MAGIC_HOUR") return { ...COLOR_PALETTE.PURPLE, abbr, label };

  // INT/EXT (ambos) se comporta como Exterior
  const ie = intExt === "INT/EXT" ? "EXT" : intExt;
  // Mañana y Tarde se comportan como Día
  const isDayLike = dayNight === "DAY" || dayNight === "MORNING" || dayNight === "AFTERNOON";

  if (isDayLike) {
    return ie === "INT"
      ? { ...COLOR_PALETTE.WHITE,  abbr, label }
      : { ...COLOR_PALETTE.YELLOW, abbr, label };
  }
  if (dayNight === "NIGHT") {
    return ie === "INT"
      ? { ...COLOR_PALETTE.GREEN, abbr, label }
      : { ...COLOR_PALETTE.BLUE,  abbr, label };
  }
  return { bg:"#888", dark:"#666", text:"#fff", abbr, label };
}
function parsePags(s) {
  if (!s) return 0;
  return String(s).trim().split(" ").reduce((acc, p) => {
    if (p.includes("/")) { const [n,d]=p.split("/"); return acc + +n/+d; }
    return acc + (parseFloat(p)||0);
  }, 0);
}
function fmtPags(n) {
  if (!n) return "0";
  const w=Math.floor(n), f=Math.round((n-w)*8);
  if (!f) return String(w); if (!w) return `${f}/8`; return `${w} ${f}/8`;
}
function parsePagesParts(s) {
  if (!s) return { whole: "", eighths: "" };
  const str = String(s).trim();
  if (str.includes("/")) {
    if (str.includes(" ")) {
      const [w, frac] = str.split(/\s+/);
      const [n] = frac.split("/");
      return { whole: w, eighths: n };
    }
    const [n] = str.split("/");
    return { whole: "", eighths: n };
  }
  return { whole: str, eighths: "" };
}
function combinePagesParts(whole, eighths) {
  const w = String(whole || "").trim();
  const e = String(eighths || "").trim();
  if (!w && !e) return "";
  if (w && !e) return w;
  if (!w && e) return `${e}/8`;
  return `${w} ${e}/8`;
}
function uid(prefix) { return `${prefix}_${Date.now()}_${Math.floor(Math.random()*9999)}`; }

// Soft per-character dot colors. Same character → same color across all strips
// (stable hash by name). Used as a small dot before each cast chip.
const CAST_DOT_COLORS = [
  "#7C9EBA", // dusty blue
  "#A89BC7", // soft purple
  "#C58F8F", // muted rose
  "#86A47E", // sage
  "#C9A36A", // ochre
  "#7B9CA3", // teal grey
  "#B58A6E", // terracotta
  "#9A8BA8", // mauve
];
function getCastDot(name) {
  if (!name) return CAST_DOT_COLORS[0];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return CAST_DOT_COLORS[h % CAST_DOT_COLORS.length];
}

const DAY_NAMES_SHORT = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const DAY_NAMES_LONG  = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MONTH_NAMES     = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MONTH_SHORT     = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function isoDate(date) {
  if (!date) return "";
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function parseISODate(s) {
  if (!s) return null;
  const parts = String(s).split('-').map(Number);
  if (parts.length !== 3 || !parts[0] || !parts[1] || !parts[2]) return null;
  return new Date(parts[0], parts[1]-1, parts[2]);
}

function formatShortDate(date) {
  if (!date) return "";
  return `${DAY_NAMES_SHORT[date.getDay()]} ${date.getDate()} ${MONTH_SHORT[date.getMonth()]}`;
}

function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

// "HH:MM" + minutes → "HH:MM"
function addMinutes(timeStr, mins) {
  if (!timeStr) return null;
  const m = String(timeStr).match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  const minsNum = parseInt(mins) || 0;
  const total = parseInt(m[1])*60 + parseInt(m[2]) + minsNum;
  if (total < 0) return null;
  const nh = Math.floor((total/60) % 24);
  const nm = total % 60;
  return `${String(nh).padStart(2,"0")}:${String(nm).padStart(2,"0")}`;
}

// Treat "DÍA 1", "DÍA 2", "DIA 5" etc as auto-generated (so they're hidden as user notes)
function isAutoDaybreakLabel(label) {
  if (!label) return true;
  return /^d[ií]a\s*\d+\s*$/i.test(String(label).trim());
}

function isNonWorkingDay(date, weeklyDaysOff, holidays) {
  if ((weeklyDaysOff||[]).includes(date.getDay())) return true;
  if ((holidays||[]).includes(isoDate(date))) return true;
  return false;
}

// Calculate auto-dates for daybreaks/dayoffs based on startDate
// Returns: { stripId: { date: "YYYY-MM-DD", dayNumber: N or null } }
function computeStripDates(board, startDate, weeklyDaysOff, holidays) {
  const result = {};
  if (!startDate) return result;
  let current = parseISODate(startDate);
  if (!current) return result;
  let dayNumber = 0;
  let inBoneyard = false;
  for (const strip of board) {
    if (strip.type === "boneyard_sep") { inBoneyard = true; continue; }
    if (inBoneyard) continue;
    const isBreaker = strip.type === "daybreak" || strip.type === "dayoff" ||
                      (strip.type === "banner" && strip.breaksDay);
    if (!isBreaker) continue;
    // If daybreak has a pinned date, jump the cursor to that date
    if (strip.pinDate && (strip.type === "daybreak" || (strip.type === "banner" && strip.breaksDay))) {
      const pinned = parseISODate(strip.pinDate);
      if (pinned && pinned >= current) current = pinned;
    }
    while (isNonWorkingDay(current, weeklyDaysOff, holidays)) {
      current = addDays(current, 1);
    }
    if (strip.type === "daybreak") dayNumber++;
    else if (strip.type === "banner" && strip.breaksDay) dayNumber++;
    result[strip.id] = {
      date: isoDate(current),
      dayNumber: (strip.type === "daybreak" || (strip.type === "banner" && strip.breaksDay)) ? dayNumber : null
    };
    current = addDays(current, 1);
  }
  return result;
}

// Compute day segments: each daybreak's range of scenes, with totals
// Returns an array of { daybreakId, endIdx, dayNumber, customLabel, sceneCount, eighths }
// Only segments with sceneCount > 0 are returned (no end-of-day row for empty days)
function computeDaySegments(board, scenes, stripDates) {
  const segments = [];
  let inBoneyard = false;
  let currentSeg = null;
  let dayCounter = 0;

  function closeSeg() {
    if (currentSeg && currentSeg.sceneCount > 0) segments.push(currentSeg);
    currentSeg = null;
  }

  for (let i = 0; i < board.length; i++) {
    const s = board[i];
    if (s.type === "boneyard_sep") { closeSeg(); inBoneyard = true; continue; }
    if (inBoneyard) continue;
    if (s.type === "daybreak" || (s.type === "banner" && s.breaksDay)) {
      closeSeg();
      dayCounter++;
      const info = stripDates[s.id];
      currentSeg = {
        daybreakId: s.id,
        endIdx: i,
        dayNumber: info?.dayNumber || dayCounter,
        date: info?.date || "",
        customLabel: s.label,
        sceneCount: 0,
        eighths: 0
      };
    } else if (s.type === "dayoff") {
      closeSeg();
    } else if (s.type === "scene") {
      if (currentSeg) {
        const sc = scenes[s.id];
        if (sc) {
          currentSeg.sceneCount++;
          currentSeg.eighths += parsePags(sc.pages);
          currentSeg.endIdx = i;
        }
      }
    } else if (currentSeg) {
      // Other strips inside a day (regular banners) extend the segment range
      currentSeg.endIdx = i;
    }
  }
  closeSeg();
  return segments;
}

// Migrate old project format (flat board/startDate) to versioned format
function ensureDefaultCategories(cats) {
  // Merge existing user categories with DEFAULT_CATEGORIES.
  // Any default missing from the user list is appended at the end.
  // Handles name variants like old "FOTOGRAFÍA/EQUIPAMIENTO ESPECIAL".
  if (!cats || cats.length === 0) return DEFAULT_CATEGORIES.slice();
  const result = cats.slice();
  DEFAULT_CATEGORIES.forEach(def => {
    const norm = s => s.trim().toUpperCase().replace(/\s*\/\s*/g, "/");
    const alreadyHas = result.some(c => norm(c) === norm(def));
    if (!alreadyHas) result.push(def);
  });
  return result;
}
// Fix character names in script blocks to UPPERCASE, action blocks to preserve original case.
// Also normalize intExt, and backfill the heading field from location/set/intExt if missing.
function normalizeScriptCharacters(scenes) {
  if (!scenes) return scenes;
  const intExtFix = { "Int":"INT", "Ext":"EXT", "int":"INT", "ext":"EXT", "int/ext":"INT/EXT", "Int/Ext":"INT/EXT" };
  let changed = false;
  const result = {};
  for (const [id, sc] of Object.entries(scenes)) {
    let scChanged = false;
    let patch = { ...sc };
    // Fix intExt
    if (sc.intExt && intExtFix[sc.intExt]) {
      patch.intExt = intExtFix[sc.intExt];
      scChanged = true;
    }
    // Backfill heading from _rawHeading (if parser stored it) or reconstruct from fields
    if (!sc.heading) {
      const ie = (patch.intExt || sc.intExt || "INT").toUpperCase();
      const loc = sc.location || "";
      const set = sc.set || "";
      patch.heading = set ? `${ie}. ${loc} / ${set}` : `${ie}. ${loc}`;
      scChanged = true;
    }
    // Fix character names in script blocks
    if (sc.script && sc.script.length > 0) {
      let scriptChanged = false;
      const newScript = sc.script.map(block => {
        const t = (block.type || "").toLowerCase();
        if (t.includes("character")) {
          const upper = (block.text || "").toUpperCase();
          if (upper !== block.text) { scriptChanged = true; return { ...block, text: upper }; }
        }
        // Action blocks: if text was lowercased by old sentenceCaseUnicode, we can't fully
        // recover original — but at minimum uppercase every word that looks like a name
        // (ALL-CAPS run of 2+ chars). This is a best-effort fix.
        if (t.includes("action") || t === "") {
          const fixed = (block.text || "").replace(/\b([A-ZÁÉÍÓÚÑÜ]{2,})\b/gu, m => m);
          if (fixed !== block.text) { scriptChanged = true; return { ...block, text: fixed }; }
        }
        return block;
      });
      if (scriptChanged) { patch.script = newScript; scChanged = true; }
    }
    if (scChanged) { changed = true; result[id] = patch; }
    else result[id] = sc;
  }
  return changed ? result : scenes;
}
function migrateProject(p) {
  if (p.versions) {
    // Already migrated — but ensure newer fields exist for older versioned projects
    const patches = {};
    const mergedCats = ensureDefaultCategories(p.categories);
    if (JSON.stringify(mergedCats) !== JSON.stringify(p.categories)) {
      patches.categories = mergedCats;
    }
    if (!p.categories)    patches.categories = DEFAULT_CATEGORIES.slice();
    if (!p.desgloseOrder) patches.desgloseOrder = (patches.categories || p.categories || DEFAULT_CATEGORIES).slice();
    // Fix character names in script blocks saved with old title-case
    const fixedScenes = normalizeScriptCharacters(p.scenes);
    if (fixedScenes !== p.scenes) patches.scenes = fixedScenes;
    return Object.keys(patches).length ? { ...p, ...patches } : p;
  }
  const v = {
    id: uid("v"),
    name: "Versión 1",
    board: p.board || [{id:"boneyard_sep",type:"boneyard_sep"}],
    startDate: p.startDate || "",
    weeklyDaysOff: p.weeklyDaysOff || [0],
    holidays: p.holidays || [],
    createdAt: p.updatedAt || Date.now(),
    updatedAt: p.updatedAt || Date.now()
  };
  const { board, startDate, weeklyDaysOff, holidays, ...rest } = p;
  return {
    ...rest,
    versions: [v],
    activeVersionId: v.id,
    categories:    p.categories    || DEFAULT_CATEGORIES.slice(),
    desgloseOrder: p.desgloseOrder || (p.categories || DEFAULT_CATEGORIES).slice()
  };
}

const KEY_PROJECTS   = "mms_v2_projects";
const KEY_ACTIVE     = "mms_v2_active";
const KEY_HIDE_HINTS = "mms_v2_hide_hints";
function loadProjects() {
  try {
    const raw = localStorage.getItem(KEY_PROJECTS);
    if (!raw) return null;
    const data = JSON.parse(raw);
    // Migrate all projects to versioned format
    const migrated = {};
    for (const [id, p] of Object.entries(data)) {
      migrated[id] = migrateProject(p);
    }
    return migrated;
  } catch(e) { return null; }
}
function loadActive()   { try { return localStorage.getItem(KEY_ACTIVE); } catch(e) { return null; } }
function saveProjects(p){ try { localStorage.setItem(KEY_PROJECTS, JSON.stringify(p)); } catch(e) {} }
function saveActive(id) { try { localStorage.setItem(KEY_ACTIVE, id); } catch(e) {} }

function App() {
  const [projects, setProjects] = useState(() => {
    const loaded = loadProjects();
    if (loaded && Object.keys(loaded).length > 0) return loaded;
    const demo = demoProject();
    return { [demo.id]: demo };

  }, [current.desgloseOrder, categories]);

  const board         = activeVersion.board         || [{id:"boneyard_sep",type:"boneyard_sep"}];
  const startDate     = activeVersion.startDate     || "";
  const weeklyDaysOff = activeVersion.weeklyDaysOff || [];
  const holidays      = activeVersion.holidays      || [];

  const [showVersionsModal, setShowVersionsModal] = useState(false);

  const [tab,        setTab]        = useState("desglose");
  const [editPrj,    setEditPrj]    = useState(false);
  const [dragIdx,    setDragIdx]    = useState(null);
  const [dragOver,   setDragOver]   = useState(null);
  const [hoveredStripIdx, setHoveredStripIdx] = useState(null);

  // ===== Undo history =====
  const undoStack = useRef([]); // array of {board, scenes} snapshots
  function pushUndo() {
    undoStack.current = [
      ...undoStack.current.slice(-39), // keep last 40
      { board: JSON.parse(JSON.stringify(board)), scenes: JSON.parse(JSON.stringify(scenes)) }
    ];
  }
  function undo() {
    if (undoStack.current.length === 0) return;
    const prev = undoStack.current[undoStack.current.length - 1];
    undoStack.current = undoStack.current.slice(0, -1);
    setProjects(p => ({
      ...p,
      [activeId]: {
        ...p[activeId],
        scenes: prev.scenes,
        versions: (p[activeId].versions || []).map(v =>
          v.id === activeVersionId ? { ...v, board: prev.board, updatedAt: Date.now() } : v
        ),
        updatedAt: Date.now()
      }
    }));
    notify("Deshecho ✓");
  }
  // Ref keeps fresh navigation state for the keydown handler (avoids stale closure)

  useEffect(() => {
    function handleKey(e) {
      const inInput = document.activeElement.tagName === "INPUT"
        || document.activeElement.tagName === "TEXTAREA"
        || document.activeElement.tagName === "SELECT";

      if ((e.ctrlKey || e.metaKey) && e.key === "z" && !e.shiftKey) {
        if (inInput) return;
        e.preventDefault();
        undo();
      }

      if (navRef.current.tab === "desglose" && !inInput && !e.ctrlKey && !e.metaKey && !e.altKey) {
        if (e.key === "ArrowRight" || e.key === "ArrowLeft") {
          e.preventDefault();
          const { sortedScenes: ss, desgloseId: cid } = navRef.current;
          const idx = ss.findIndex(s => s.id === cid);
          if (e.key === "ArrowRight" && idx < ss.length - 1) setDesgloseId(ss[idx + 1].id);
          if (e.key === "ArrowLeft"  && idx > 0)             setDesgloseId(ss[idx - 1].id);
        }
      }
    }
    window.addEventListener("keydown", handleKey);
    return () => window.removeEventListener("keydown", handleKey);
  }, [board, scenes, activeId, activeVersionId]);
  const [hideHints,  setHideHints]  = useState(() => {
    try { return localStorage.getItem(KEY_HIDE_HINTS) === "1"; } catch(e) { return false; }
  });
  function dismissHints() {
    setHideHints(true);
    try { localStorage.setItem(KEY_HIDE_HINTS, "1"); } catch(e) {}
  }
  const [notice,     setNotice]     = useState("");
  const [activeCat,  setActiveCat]  = useState("CAST");
  const [expandedLocs, setExpandedLocs] = useState({}); // { "Casa Juan": true }
  const [contextMenu, setContextMenu] = useState(null);
  const [showProjectsModal, setShowProjectsModal] = useState(false);
  const [showBoneyard,   setShowBoneyard]   = useState(true);
  const [sidebarDragOver, setSidebarDragOver] = useState(false);
  const [showBannerModal, setShowBannerModal] = useState(null);
  const [bannerForm, setBannerForm] = useState({type:"desayuno", label:"", customLabel:"", breaksDay:false, duration:0, decorative:false});

  // ===== Desglose state =====
  const [desgloseId, setDesgloseId] = useState(null);
  const [searchNum, setSearchNum] = useState("");
  const [elemDrafts, setElemDrafts] = useState({});
  const [showScriptPanel, setShowScriptPanel] = useState(true);
  const scriptSceneRefs = React.useRef({});
  const [scriptSelection, setScriptSelection] = useState(null);
  const [scriptHighlights, setScriptHighlights] = useState({});

  const categoryHighlightColors = {
    cast:        "#F87171", // rojo
    extras:      "#86EFAC", // verde
    props:       "#C084FC", // morado
    ambientacion:"#A78BFA", // morado suave
    vestuario:   "#D4A76A", // café
    maquillaje:  "#F9A8D4", // rosado
    vehiculos:   "#2DD4BF", // teal
    animales:    "#FB923C", // naranja
    sfx:         "#5EEAD4", // turquesa
    vfx:         "#5EEAD4", // turquesa
    sonido:      "#FDE047", // amarillo
    fotografia:  "#D97706", // amarillo oscuro
    notas:       "#FCA5A5", // rojo claro
    default:     "#CBD5E1", // gris neutro
  };

  // Map a real category name → color key
  function getCatColorKey(catName) {
    const u = catName.toUpperCase();
    if (u.includes("CAST"))                                    return "cast";
    if (u.includes("EXTRA"))                                   return "extras";
    if (u.includes("PROP"))                                    return "props";
    if (u.includes("AMBIENT") || u.includes("AMBIENTACI"))    return "ambientacion";
    if (u.includes("VEST"))                                    return "vestuario";
    if (u.includes("MAQUI") || u.includes("PELO") || u.includes("HAIR")) return "maquillaje";
    if (u.includes("VEH"))                                     return "vehiculos";
    if (u.includes("ANIMAL"))                                  return "animales";
    if (u.includes("SFX") || u.includes("VFX") || u.includes("FX")) return "sfx";
    if (u.includes("SONIDO") || u.includes("SOUND"))          return "sonido";
    if (u.includes("FOTOG") || u.includes("EQUIP") || u.includes("PHOTO")) return "fotografia";
    if (u.includes("NOTA") || u.includes("PRODUCCI"))         return "notas";
    return "default";
  }

  function handleScriptSelection(e, sceneId, blockIdx, blockText) {
    const selection = window.getSelection();
    const text = selection ? selection.toString().trim() : "";

    if (!text) {
      setScriptSelection(null);
      return;
    }

    const range = selection.getRangeAt(0);
    const rect = range.getBoundingClientRect();

    const start = blockText.indexOf(text);

    if (start === -1) return;

    setScriptSelection({
      text,
      sceneId,
      blockIdx,
      start,
      end: start + text.length,
      x: rect.left + window.scrollX,
      y: rect.top + window.scrollY
    });
  }

  // Add a specific value to a category in the current scene (used by script tagging)
  function addElementWithValue(cat, rawValue) {
    const sceneId = scriptSelection?.sceneId || desgloseId;
    if (!sceneId) return;
    const v = normalizeElement(cat, rawValue.trim());
    if (!v) return;
    const sc = scenes[sceneId];
    if (!sc) return;
    const items = (cat === "CAST")
      ? (sc.elements?.CAST || sc.cast || [])
      : (sc.elements?.[cat] || []);
    if (items.includes(v)) return; // already there, no duplicate
    const newItems = [...items, v];
    const patch = {elements: {...(sc.elements||{}), [cat]: newItems}};
    if (cat === "CAST") patch.cast = newItems;
    updateScene(sceneId, patch);
  }

  function addHighlight(categoryKey) {
    if (!scriptSelection) return;

    const key = `${scriptSelection.sceneId}_${scriptSelection.blockIdx}`;
    const colorKey2 = getCatColorKey(categoryKey);
    const newColor = categoryHighlightColors[colorKey2] || "#E5E7EB";

    // Check if this exact text span is already highlighted
    setScriptHighlights(prev => {
      const existing = prev[key] || [];
      const dupIdx = existing.findIndex(m =>
        m.start === scriptSelection.start && m.end === scriptSelection.end
      );
      if (dupIdx >= 0) {
        // Already tagged — move to new category (update color + category, don't duplicate)
        const updated = existing.map((m, i) =>
          i === dupIdx ? { ...m, category: categoryKey, color: newColor } : m
        );
        return { ...prev, [key]: updated };
      }
      return {
        ...prev,
        [key]: [...existing, {
          start: scriptSelection.start,
          end: scriptSelection.end,
          text: scriptSelection.text,
          category: categoryKey,
          color: newColor
        }]
      };
    });

    // === WRITE TO SCENE ELEMENT CATEGORY ===
    const realCat = categories.find(c => c.toUpperCase() === categoryKey)
      || categories.find(c => c.toUpperCase().replace(/[ÁÀÄÂ]/g,"A").replace(/[ÉÈËÊ]/g,"E").replace(/[ÍÌÏÎ]/g,"I").replace(/[ÓÒÖÔ]/g,"O").replace(/[ÚÙÜÛ]/g,"U")
           === categoryKey.replace(/[ÁÀÄÂ]/g,"A").replace(/[ÉÈËÊ]/g,"E").replace(/[ÍÌÏÎ]/g,"I").replace(/[ÓÒÖÔ]/g,"O").replace(/[ÚÙÜÛ]/g,"U"));

    if (realCat) {
      addElementWithValue(realCat, scriptSelection.text);
      notify(`"${scriptSelection.text}" → ${realCat} ✓`);
    }

    setScriptSelection(null);
    window.getSelection()?.removeAllRanges();
  }

  function removeHighlightByText(sceneId, text) {
    // Remove all highlights matching this text from all blocks of this scene
    setScriptHighlights(prev => {
      const next = { ...prev };
      for (const key of Object.keys(next)) {
        if (key.startsWith(sceneId + "_")) {
          next[key] = next[key].filter(m => m.text !== text);
        }
      }
      return next;
    });
  }

  
  React.useEffect(() => {
    function closeSelection() {
      setTimeout(() => {
        const sel = window.getSelection()?.toString() || "";
        if (!sel.trim()) setScriptSelection(null);
      }, 50);
    }

    document.addEventListener("mousedown", closeSelection);
    return () => document.removeEventListener("mousedown", closeSelection);
  }, []);

  function renderHighlightedText(sceneId, blockIdx, text) {
    const key = `${sceneId}_${blockIdx}`;
    const marks = scriptHighlights[key] || [];

    if (!marks.length) return text;

    let elements = [];
    let lastIndex = 0;

    marks
      .sort((a,b)=>a.start-b.start)
      .forEach((m, idx) => {
        elements.push(text.slice(lastIndex, m.start));

        elements.push(
          React.createElement(
            "span",
            {
              key: idx,
              style: {
                color: m.color,
                fontWeight: 700,
              },
              title: m.category
            },
            text.slice(m.start, m.end)
          )
        );

        lastIndex = m.end;
      });

    elements.push(text.slice(lastIndex));

    return elements;
  }

  React.useEffect(() => {
    if (showScriptPanel && currentScene && scriptSceneRefs.current[currentScene.id]) {
      scriptSceneRefs.current[currentScene.id].scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }
  }, [showScriptPanel, desgloseId]);

  // ===== Calendar state =====
  const [calMonth, setCalMonth] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });
  const [holidayDraft, setHolidayDraft] = useState("");
  const [calDragSceneId, setCalDragSceneId] = useState(null);
  const [calDragOverDate, setCalDragOverDate] = useState(null);

  // ===== Autocomplete state for element inputs =====
  const [focusedCat, setFocusedCat] = useState(null);
  const catInputRefs = useRef({}); // map of cat → input DOM node
  const [focusedLocSet, setFocusedLocSet] = useState(null); // "location" | "set" | null
  const [locSetHighlight, setLocSetHighlight] = useState(0);
  const [locSetDropdownRect, setLocSetDropdownRect] = useState(null); // {top,left,width}
  const [highlightIdx, setHighlightIdx] = useState(0);
  const [hoveredCat,  setHoveredCat]  = useState(null);
  const [dragCatIdx,  setDragCatIdx]  = useState(null);
  const [dragOverCatIdx, setDragOverCatIdx] = useState(null);

  function notify(msg){ setNotice(msg); setTimeout(()=>setNotice(""),2200); }

  useEffect(() => { saveProjects(projects); }, [projects]);
  useEffect(() => { if (activeId) saveActive(activeId); }, [activeId]);

  function updateProject(patch) {
    setProjects(prev => ({ ...prev, [activeId]: { ...prev[activeId], ...patch, updatedAt: Date.now() } }));
  }
  // Updates fields on the active version
  function updateActiveVersion(patch) {
    setProjects(prev => {
      const proj = prev[activeId];
      if (!proj) return prev;
      const updatedVersions = (proj.versions || []).map(v =>
        v.id === activeVersionId ? { ...v, ...patch, updatedAt: Date.now() } : v
      );
      return { ...prev, [activeId]: { ...proj, versions: updatedVersions, updatedAt: Date.now() } };
    });
  }
  const setScenes  = (newScenes) => updateProject({ scenes: typeof newScenes === "function" ? newScenes(scenes) : newScenes });
  const setBoard = (newBoard) => {
    pushUndo();
    updateActiveVersion({ board: typeof newBoard === "function" ? newBoard(board) : newBoard });
  };
  const setProject = (newName)   => updateProject({ name: newName });

  // Calendar mutations (now on active version)
  const setStartDate = (d) => updateActiveVersion({ startDate: d });
  function toggleWeeklyDayOff(dayIdx) {
    const set = new Set(weeklyDaysOff);
    if (set.has(dayIdx)) set.delete(dayIdx); else set.add(dayIdx);
    updateActiveVersion({ weeklyDaysOff: Array.from(set).sort((a,b)=>a-b) });
  }
  function addHoliday(d) {
    if (!d || holidays.includes(d)) return;
    updateActiveVersion({ holidays: [...holidays, d].sort() });
  }
  function removeHoliday(d) {
    updateActiveVersion({ holidays: holidays.filter(h => h !== d) });
  }

  // ===== Version actions =====
  function newVersion() {
    const name = prompt("Nombre de la nueva versión:", `Versión ${versions.length + 1}`);
    if (!name) return;
    const v = emptyVersion(name);
    // New version starts with same board structure (copies current board) but user can also start fresh
    const startFresh = confirm(`¿Empezar la versión "${name}" con el board vacío?\n\nAceptar = board vacío\nCancelar = copiar el plan actual`);
    const newBoard = startFresh
      ? [{id:"boneyard_sep",type:"boneyard_sep"}]
      : JSON.parse(JSON.stringify(board));
    const newV = { ...v, board: newBoard };
    setProjects(prev => {
      const proj = prev[activeId];
      return { ...prev, [activeId]: { ...proj, versions: [...(proj.versions||[]), newV], activeVersionId: newV.id, updatedAt: Date.now() } };
    });
    setShowVersionsModal(false);
    notify(`Versión "${name}" creada ✓`);
  }
  function duplicateVersion(vId) {
    const orig = versions.find(v => v.id === vId);
    if (!orig) return;
    const name = prompt("Nombre de la copia:", `${orig.name} (copia)`);
    if (!name) return;
    const copy = { ...JSON.parse(JSON.stringify(orig)), id: uid("v"), name, createdAt: Date.now(), updatedAt: Date.now() };
    setProjects(prev => {
      const proj = prev[activeId];
      return { ...prev, [activeId]: { ...proj, versions: [...(proj.versions||[]), copy], activeVersionId: copy.id, updatedAt: Date.now() } };
    });
    setShowVersionsModal(false);
    notify(`"${name}" creada ✓`);
  }
  function renameVersion(vId) {
    const orig = versions.find(v => v.id === vId);
    if (!orig) return;
    const name = prompt("Nuevo nombre:", orig.name);
    if (!name) return;
    setProjects(prev => {
      const proj = prev[activeId];
      const updatedVersions = (proj.versions||[]).map(v => v.id === vId ? { ...v, name } : v);
      return { ...prev, [activeId]: { ...proj, versions: updatedVersions, updatedAt: Date.now() } };
    });
  }
  function deleteVersion(vId) {
    if (versions.length <= 1) { alert("No puedes eliminar la única versión. Crea una nueva primero."); return; }
    const orig = versions.find(v => v.id === vId);
    if (!confirm(`¿Eliminar la versión "${orig?.name}"? No se puede deshacer.`)) return;
    const remaining = versions.filter(v => v.id !== vId);
    const newActiveId = activeVersionId === vId ? remaining[0].id : activeVersionId;
    setProjects(prev => {
      const proj = prev[activeId];
      return { ...prev, [activeId]: { ...proj, versions: remaining, activeVersionId: newActiveId, updatedAt: Date.now() } };
    });
    notify("Versión eliminada ✓");
  }
  function switchToVersion(vId) {
    setProjects(prev => {
      const proj = prev[activeId];
      if (!proj) return prev;
      // Sync: add any scenes missing from this version's board into its boneyard
      const targetVersion = (proj.versions||[]).find(v => v.id === vId);
      if (!targetVersion) return prev;
      const boardIds = new Set((targetVersion.board||[]).map(s => s.id));
      const missingSceneIds = Object.keys(proj.scenes||{}).filter(id => !boardIds.has(id));
      if (missingSceneIds.length === 0) {
        // No missing scenes, just switch
        return { ...prev, [activeId]: { ...proj, activeVersionId: vId, updatedAt: Date.now() } };
      }
      // Insert missing scenes at the end (into boneyard)
      const newStrips = missingSceneIds.map(id => ({ id, type:"scene" }));
      const updatedVersions = (proj.versions||[]).map(v =>
        v.id === vId
          ? { ...v, board: [...(v.board||[]), ...newStrips], updatedAt: Date.now() }
          : v
      );
      return { ...prev, [activeId]: { ...proj, versions: updatedVersions, activeVersionId: vId, updatedAt: Date.now() } };
    });
    setShowVersionsModal(false);
    const v = versions.find(v => v.id === vId);
    notify(`"${v?.name}" cargada ✓`);
  }

  function updateScene(id, patch) {
    setProjects(prev => {
      const proj = prev[activeId];
      if (!proj || !proj.scenes[id]) return prev;
      return {
        ...prev,
        [activeId]: {
          ...proj,
          scenes: { ...proj.scenes, [id]: { ...proj.scenes[id], ...patch } },
          updatedAt: Date.now()
        }
      };
    });
  }

  // Sort scenes by number for navigation/list
  const sortedScenes = useMemo(() =>
    Object.values(scenes).sort((a,b) => (parseFloat(a.num)||999) - (parseFloat(b.num)||999))
  , [scenes]);

  // Make sure desgloseId is valid
  useEffect(() => {
    if (Object.keys(scenes).length === 0) {
      if (desgloseId !== null) setDesgloseId(null);
      return;
    }
    if (!desgloseId || !scenes[desgloseId]) {
      const first = sortedScenes[0];
      if (first) setDesgloseId(first.id);
    }
  }, [scenes, desgloseId, sortedScenes]);

  // Sync: if any scene in scenes{} is missing from the active version's board, add it to the boneyard
  useEffect(() => {
    const boardIds = new Set(board.map(s => s.id));
    const missing = Object.keys(scenes).filter(id => !boardIds.has(id));
    if (missing.length === 0) return;
    const newStrips = missing.map(id => ({ id, type:"scene" }));
    // Append to end (after boneyard_sep = into boneyard)
    updateActiveVersion({ board: [...board, ...newStrips] });
  }, [activeVersionId, activeId]); // only run when version or project changes

  // Sync element draft inputs when scene changes
  useEffect(() => {
    setElemDrafts({});
  }, [desgloseId]);

  const currentScene = desgloseId ? scenes[desgloseId] : null;
  const currentIndex = currentScene ? sortedScenes.findIndex(s => s.id === desgloseId) : -1;

  // Ref keeps fresh navigation state for the keydown handler (avoids stale closure)
  const navRef = useRef({});
  navRef.current = { tab, sortedScenes, desgloseId };

  useEffect(() => {
    if (!contextMenu) return;
    const close = () => setContextMenu(null);
    window.addEventListener("click", close);
    window.addEventListener("scroll", close, true);
    return () => { window.removeEventListener("click", close); window.removeEventListener("scroll", close, true); };
  }, [contextMenu]);

  // ===== Drag & drop =====
  function onDragStart(e,idx){ setDragIdx(idx); e.dataTransfer.effectAllowed="move"; }
  function onDragOver(e,idx){ e.preventDefault(); setDragOver(idx); }
  function onDrop(e,idx){
    e.preventDefault();
    // Case 1: dropping a scene that came from the lateral boneyard sidebar
    // (uses dataTransfer rather than dragIdx). Insert AT cursor position.
    const scId = e.dataTransfer.getData("boneyardSceneId");
    if (scId) {
      e.stopPropagation(); // prevent parent container fallback from overriding placement
      const targetStripId = board[idx]?.id;
      const nb = board.filter(s => s.id !== scId);
      // Translate idx to nb's index (the strip that was at idx may have shifted
      // if scId was before it — though typically scId comes from the boneyard
      // section, so this is just a safety check).
      let insertIdx = idx;
      if (targetStripId && targetStripId !== scId) {
        const newIdx = nb.findIndex(s => s.id === targetStripId);
        if (newIdx >= 0) insertIdx = newIdx;
      }
      nb.splice(insertIdx, 0, {id:scId, type:"scene"});
      setBoard(nb);
      resetDrag();
      notify("Escena calendarizada ✓");
      return;
    }
    // Case 2: standard reorder of an existing strip
    if(dragIdx===null||dragIdx===idx){ resetDrag(); return; }
    const nb=[...board];
    const [item]=nb.splice(dragIdx,1);
    nb.splice(idx,0,item);
    setBoard(nb); resetDrag(); notify("Movido ✓");
  }
  function resetDrag(){ setDragIdx(null); setDragOver(null); }

  // ===== Scene actions =====
  // ===== FDX Import =====
  const [fdxImportState, setFdxImportState] = useState(null); // null | "preview" | "importing"
  const [fdxScenes, setFdxScenes]           = useState([]);   // parsed scenes before confirm
  const fdxInputRef = useRef(null);

  // Robust Title Case para español: maneja acentos, ñ, etc.
  // Divide en palabras por espacios y capitaliza la primera letra de cada una,
  // dejando el resto en minúsculas — funciona correctamente con JoaquÍN → Joaquín
  function titleCaseUnicode(str) {
    if (!str) return str;
    return str.trim().toLowerCase().replace(/(?:^|\s)\S/g, c => c.toUpperCase());
  }

  // Sentence case: solo primera letra del string en mayúscula
  function sentenceCaseUnicode(str) {
    if (!str) return str;
    const s = str.trim().toLowerCase();
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  function parseFDX(xmlText) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, "application/xml");

    // Map FDX time-of-day to our dayNight values
    const timeMap = {
      "DAY":"DAY","DÍA":"DAY","DIA":"DAY","DÍA":"DAY",
      "NIGHT":"NIGHT","NOCHE":"NIGHT",
      "DAWN":"DAWN","AMANECER":"DAWN",
      "DUSK":"DUSK","ATARDECER":"DUSK","CREPÚSCULO":"DUSK",
      "MORNING":"MORNING","MAÑANA":"MORNING",
      "AFTERNOON":"AFTERNOON","TARDE":"AFTERNOON",
      "EVENING":"EVENING","NOCHE TEMPRANA":"EVENING",
      "CONTINUOUS":"CONTINUOUS","CONTINUACIÓN":"CONTINUOUS","CONTINUO":"CONTINUOUS",
      "LATER":"LATER","DESPUÉS":"LATER","MÁS TARDE":"LATER",
      "MOMENTS LATER":"MOMENTS_LATER","MOMENTOS DESPUÉS":"MOMENTS_LATER",
    };

    const intExtMap = {
      "INT":"INT","EXT":"EXT","INT/EXT":"INT/EXT","EXT/INT":"INT/EXT",
      "I":"INT","E":"EXT",
    };

    // IMPORTANT:
    // Only read screenplay paragraphs directly under <Content>.
    // Some FDX files contain MANY nested <Paragraph> nodes inside metadata
    // (SceneArcs, StoryMap, etc.) which break sibling traversal.
    const contentNode = doc.querySelector("Content");
    const paragraphs = contentNode
      ? Array.from(contentNode.children).filter(n => n.tagName === "Paragraph")
      : [];
    const parsed = [];
    let sceneCounter = 0;

    paragraphs.forEach(p => {
      const type = p.getAttribute("Type") || p.getAttribute("type") || "";

      // Ignore nested metadata paragraphs and only process real screenplay scene headings
      if (!["Scene Heading","Scene Heading (Alt)","Heading"].includes(type)) return;

      // Collect all Text nodes inside this paragraph
      const rawText = Array.from(p.querySelectorAll("Text"))
        .map(t => t.textContent).join("").trim().toUpperCase();

      if (!rawText) return;

      // Parse "INT. LOCACIÓN - MOMENTO" or "EXT. LOCACIÓN / SET - MOMENTO"
      // Also handle "INT/EXT." and omitted dot
      const headingMatch = rawText.match(
        /^(INT\.?\/EXT\.?|EXT\.?\/INT\.?|INT\.?|EXT\.?|I\/E\.?)\s*[-–.]?\s*(.+?)(?:\s*[-–]\s*(.+))?$/
      );

      sceneCounter++;

      if (!headingMatch) {
        // Can't parse it cleanly — store as-is with raw name
        parsed.push({
          _rawHeading: rawText,
          num: String(sceneCounter),
          intExt: "INT",
          dayNight: "DAY",
          location: rawText,
          set: "",
          name: "",
          pages: "",
          cast: [],
          elements: {}
        });
        return;
      }

      const ieRaw = headingMatch[1].replace(/\./g,"").replace("/","\/").toUpperCase();
      const locRaw = (headingMatch[2] || "").trim();
      const timeRaw = (headingMatch[3] || "").trim().toUpperCase();

      // Location may include "LOCACIÓN / SET" — split on "/"
      const locParts = locRaw.split("/").map(s => s.trim());
      const location = locParts[0] || "";
      const set = locParts[1] || "";

      // Normalize INT/EXT
      const intExt = intExtMap[ieRaw] || intExtMap[ieRaw.replace("/EXT","").replace("/INT","")] || "INT";

      // Normalize time — match any word in timeRaw
      let dayNight = "DAY";
      for (const [key, val] of Object.entries(timeMap)) {
        if (timeRaw.includes(key)) { dayNight = val; break; }
      }

      // Now collect screenplay content immediately following this heading
      // (up until the next Scene Heading)
      let actionLines = [];
      let castNames = [];
      let scriptBlocks = [];
      let sibling = p.nextElementSibling;
      while (sibling) {
        const sibType = sibling.getAttribute("Type") || sibling.getAttribute("type") || "";
        if (["Scene Heading","Scene Heading (Alt)","Heading"].includes(sibType)) break;
        const sibText = Array.from(sibling.querySelectorAll("Text"))
          .map(t => t.textContent).join("").trim();

        // Normalize type regardless of whether sibText is empty
        let normalizedType = sibType;
        const lowerType = String(sibType).toLowerCase();
        if (lowerType.includes("dialog")) normalizedType = "Dialogue";
        else if (lowerType.includes("character")) normalizedType = "Character";
        else if (lowerType.includes("parenthetical")) normalizedType = "Parenthetical";
        else if (lowerType.includes("transition")) normalizedType = "Transition";
        else if (lowerType.includes("action") || lowerType.includes("general")) normalizedType = "Action";

        if (sibText) {
          // Normalize screenplay block types across Final Draft / Fade In / WriterDuet variants
          scriptBlocks.push({
            type: normalizedType,
            text: normalizedType === "Character"
              ? sibText.replace(/\s*\(.*?\)\s*/g,"").trim().toUpperCase()
              : sibText
          });
        }

        if (normalizedType === "Action" && sibText) {
          actionLines.push(sibText);
        }
        if (normalizedType === "Character" && sibText) {
          const cleanName = sibText.replace(/\s*\(.*?\)\s*/g,"").trim().toUpperCase();
          if (cleanName && !castNames.includes(cleanName)) castNames.push(cleanName);
        }
        sibling = sibling.nextElementSibling;
      }

      // Use first action paragraph as synopsis (max ~120 chars)
      const synopsis = actionLines.length
        ? actionLines[0].length > 120
          ? actionLines[0].slice(0,117) + "..."
          : actionLines[0]
        : "";

      // SceneProperties: Length is already in our format: "4/8", "2 2/8", "1", etc.
      const sceneProps = p.querySelector("SceneProperties");
      let pagesStr = "";
      if (sceneProps) {
        const lengthAttr = sceneProps.getAttribute("Length");
        if (lengthAttr && lengthAttr.trim()) {
          pagesStr = lengthAttr.trim();
        }
      }

      parsed.push({
        _rawHeading: rawText,
        num: String(sceneCounter),
        intExt,
        dayNight,
        location,
        set,
        name: synopsis,
        cast: castNames,
        pages: pagesStr,
        script: scriptBlocks,
        elements: {}
      });
    });

    return parsed;
  }

  function handleFdxFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const scenes = parseFDX(e.target.result);
        if (scenes.length === 0) {
          alert("No se encontraron encabezados de escena en el archivo. Verificá que sea un .fdx válido.");
          return;
        }
        setFdxScenes(scenes);
        setFdxImportState("preview");
      } catch(err) {
        alert("Error al leer el archivo FDX: " + err.message);
      }
    };
    reader.readAsText(file, "UTF-8");
  }

  function confirmFdxImport(mode) {
    // mode: "replace" | "merge"
    if (mode === "replace" && !confirm(
      `¿Reemplazar TODAS las escenas actuales con las ${fdxScenes.length} del guion?\n\nEsto eliminará todo el desglose existente. No se puede deshacer.`
    )) return;

    pushUndo();

    setProjects(prev => {
      const proj = prev[activeId];
      if (!proj) return prev;

      let existingNums = new Set(Object.values(proj.scenes||{}).map(s => s.num));

      let newScenes = {};
      let newStrips = [];

      // In replace mode, start fresh
      const baseScenes = mode === "replace" ? {} : { ...(proj.scenes||{}) };
      if (mode === "replace") existingNums = new Set();

      for (const sc of fdxScenes) {
        // In merge mode, skip scenes whose number already exists
        if (mode === "merge" && existingNums.has(sc.num)) continue;
        const id = uid("s");
        newScenes[id] = {
          id,
          num: sc.num,
          name: sc.name,
          heading: sc._rawHeading || "",
          location: sc.location,
          set: sc.set,
          intExt: sc.intExt,
          dayNight: sc.dayNight,
          pages: sc.pages || "",
          cast: sc.cast,
          script: sc.script || [],
          elements: {}
        };
        newStrips.push({id, type:"scene"});
      }

      const mergedScenes = { ...baseScenes, ...newScenes };

      // Update board: in replace mode wipe + re-add; in merge add strips to boneyard
      const updatedVersions = (proj.versions||[]).map(v => {
        let newBoard;
        if (mode === "replace") {
          newBoard = [
            ...newStrips,
            { id:"boneyard_sep", type:"boneyard_sep" }
          ];
        } else {
          // Keep existing board, append new strips before boneyard_sep
          const b = v.board || [];
          const sepIdx = b.findIndex(s => s.type === "boneyard_sep");
          if (sepIdx >= 0) {
            newBoard = [...b.slice(0, sepIdx), ...newStrips, ...b.slice(sepIdx)];
          } else {
            newBoard = [...b, ...newStrips];
          }
        }
        return { ...v, board: newBoard, updatedAt: Date.now() };
      });

      return {
        ...prev,
        [activeId]: { ...proj, scenes: mergedScenes, versions: updatedVersions, updatedAt: Date.now() }
      };
    });

    setFdxImportState(null);
    setFdxScenes([]);
    notify(`${fdxScenes.length} escenas importadas del guion ✓`);
  }

  function navigateTo(id) {
    if (id === desgloseId) return;
    setDesgloseId(id);
  }

  function goFirst() { if (sortedScenes.length) navigateTo(sortedScenes[0].id); }
  function goPrev()  { if (currentIndex > 0) navigateTo(sortedScenes[currentIndex-1].id); }
  function goNext()  { if (currentIndex < sortedScenes.length-1) navigateTo(sortedScenes[currentIndex+1].id); }
  function goLast()  { if (sortedScenes.length) navigateTo(sortedScenes[sortedScenes.length-1].id); }

  function searchByNumber() {
    const q = searchNum.trim();
    if (!q) return;
    const found = sortedScenes.find(s => String(s.num) === q);
    if (found) {
      navigateTo(found.id);
      setSearchNum("");
      notify(`Escena ${q} encontrada ✓`);
    } else {
      notify(`No existe la escena N° ${q}`);
    }
  }

  function newSceneInBreakdown() {
    const id = uid("s");
    const nums = Object.values(scenes).map(s => parseFloat(s.num)||0);
    const nextNum = nums.length ? String(Math.max(...nums)+1) : "1";
    const newScene = {id, num:nextNum, name:"", location:"", set:"", intExt:"INT", dayNight:"DAY", pages:"", cast:[], elements:{}};
    const strip = {id, type:"scene"};

    // Add scene to shared scenes + insert into ALL versions' boneyard
    setProjects(prev => {
      const proj = prev[activeId];
      if (!proj) return prev;
      const updatedVersions = (proj.versions||[]).map(v => {
        const b = v.board || [];
        const nb = [...b];
        // Always push to end (after boneyard_sep = into boneyard, or at end if sep missing)
        nb.push(strip);
        return { ...v, board: nb, updatedAt: Date.now() };
      });
      return {
        ...prev,
        [activeId]: {
          ...proj,
          scenes: { ...proj.scenes, [id]: newScene },
          versions: updatedVersions,
          updatedAt: Date.now()
        }
      };
    });

    setDesgloseId(id);
    setTab("desglose");
    notify("Nueva escena creada — está en el boneyard de cada versión ✓");
  }

  function deleteCurrentScene() {
    if (!desgloseId || !scenes[desgloseId]) return;
    const sc = scenes[desgloseId];
    if (!confirm(`¿Eliminar la escena ${sc.num} "${sc.name||"(sin nombre)"}"?\nSe quitará de TODAS las versiones del plan. No se puede deshacer.`)) return;
    const id = desgloseId;
    const idx = sortedScenes.findIndex(s => s.id === id);
    let nextId = null;
    if (sortedScenes.length > 1) {
      nextId = idx < sortedScenes.length-1 ? sortedScenes[idx+1].id : sortedScenes[idx-1].id;
    }

    // Remove from shared scenes + remove strip from ALL versions
    setProjects(prev => {
      const proj = prev[activeId];
      if (!proj) return prev;
      const newScenes = { ...proj.scenes };
      delete newScenes[id];
      const updatedVersions = (proj.versions||[]).map(v => ({
        ...v,
        board: (v.board||[]).filter(s => s.id !== id),
        updatedAt: Date.now()
      }));
      return {
        ...prev,
        [activeId]: { ...proj, scenes: newScenes, versions: updatedVersions, updatedAt: Date.now() }
      };
    });

    setDesgloseId(nextId);
    notify("Escena eliminada de todas las versiones ✓");
  }

  function moveCurrentToBoneyard() {
    if (!desgloseId) return;
    const bi = board.findIndex(s => s.type === "boneyard_sep");
    if (bi < 0) return;
    const stripIdx = board.findIndex(s => s.id === desgloseId);
    if (stripIdx < 0 || stripIdx > bi) return;
    const nb = [...board];
    const [strip] = nb.splice(stripIdx, 1);
    nb.push(strip);
    setBoard(nb);
    notify("Movido al boneyard ✓");
  }

  function moveCurrentOutOfBoneyard() {
    if (!desgloseId) return;
    const bi = board.findIndex(s => s.type === "boneyard_sep");
    if (bi < 0) return;
    const stripIdx = board.findIndex(s => s.id === desgloseId);
    if (stripIdx < 0 || stripIdx <= bi) return;
    const nb = [...board];
    const [strip] = nb.splice(stripIdx, 1);
    nb.splice(bi, 0, strip);
    setBoard(nb);
    notify("Movido al stripboard ✓");
  }

  // Move a scene to the day represented by targetDateISO (used by calendar drag & drop)
  function moveSceneToDate(sceneId, targetDateISO) {
    if (!sceneId || !targetDateISO || !startDate) return;

    const isBoundary = s => s.type === "daybreak" || s.type === "dayoff" ||
      s.type === "boneyard_sep" || (s.type === "banner" && s.breaksDay);

    // 1. Already has a daybreak for this date?
    let targetDaybreakId = null;
    for (const [id, info] of Object.entries(stripDates)) {
      if (info.date === targetDateISO && info.dayNumber) { targetDaybreakId = id; break; }
    }

    let nb = [...board];

    if (!targetDaybreakId) {
      // 2. Create a new daybreak with pinDate = targetDateISO.
      // Insert it just before the first existing daybreak whose date > targetDateISO,
      // or before the boneyard if none exist after it.
      const boneyardIdx = nb.findIndex(s => s.type === "boneyard_sep");
      const cutoff = boneyardIdx >= 0 ? boneyardIdx : nb.length;

      let insertAt = cutoff;
      for (let i = 0; i < cutoff; i++) {
        const s = nb[i];
        if (s.type === "daybreak" || (s.type === "banner" && s.breaksDay)) {
          const info = stripDates[s.id];
          if (info && info.date > targetDateISO) {
            insertAt = i;
            break;
          }
        }
      }

      const newDb = { id: uid("db"), type: "daybreak", label: "", pinDate: targetDateISO };
      nb.splice(insertAt, 0, newDb);
      targetDaybreakId = newDb.id;
      notify("Nueva jornada creada — " + targetDateISO + " ✓");
    }

    // 3. Find scene's origin daybreak (to remove if it becomes empty)
    const sceneOldIdx = nb.findIndex(s => s.id === sceneId);
    if (sceneOldIdx < 0) return;
    let originDaybreakId = null;
    for (let i = sceneOldIdx - 1; i >= 0; i--) {
      if (nb[i].type === "daybreak" || (nb[i].type === "banner" && nb[i].breaksDay)) {
        originDaybreakId = nb[i].id; break;
      }
    }

    // 4. Remove scene
    const [strip] = nb.splice(sceneOldIdx, 1);

    // 5. Remove origin daybreak if now empty
    if (originDaybreakId && originDaybreakId !== targetDaybreakId) {
      const oi = nb.findIndex(s => s.id === originDaybreakId);
      if (oi >= 0) {
        let hasScene = false;
        for (let i = oi + 1; i < nb.length; i++) {
          if (isBoundary(nb[i])) break;
          if (nb[i].type === "scene") { hasScene = true; break; }
        }
        if (!hasScene) nb.splice(oi, 1);
      }
    }

    // 6. Insert at end of target day
    const dbIdx = nb.findIndex(s => s.id === targetDaybreakId);
    if (dbIdx < 0) return;
    let insertScene = nb.length;
    for (let i = dbIdx + 1; i < nb.length; i++) {
      if (isBoundary(nb[i])) { insertScene = i; break; }
    }
    nb.splice(insertScene, 0, strip);
    setBoard(nb);
    notify("Escena movida ✓");
  }

  // Used by stripboard click, context menu, elementos chip click
  function openEdit(id) {
    setDesgloseId(id);
    setTab("desglose");
  }

  function moveToBoneyard(id){
    const bi=board.findIndex(s=>s.type==="boneyard_sep");
    if (bi<0) return;
    const stripIdx=board.findIndex(s=>s.id===id);
    if (stripIdx<0 || stripIdx>bi) return;
    const nb=[...board];
    const [strip]=nb.splice(stripIdx,1);
    nb.push(strip);
    setBoard(nb); notify("Movido al boneyard ✓");
  }

  // ===== Element actions on current scene =====
  // Normalize element names on save:
  // CAST, EXTRAS, STUNTS → Title Case (son nombres de personas)
  // Todo lo demás → Sentence case (primera letra mayúscula, resto como viene)
  const TITLE_CASE_CATS = ["CAST", "EXTRAS", "STUNTS"];
  function normalizeElement(cat, value) {
    const v = value.trim();
    if (!v) return v;
    if (TITLE_CASE_CATS.includes(cat)) {
      return titleCaseUnicode(v);
    }
    return sentenceCaseUnicode(v);
  }

  function addElementToCurrent(cat) {
    if (!desgloseId) return;
    const raw = (elemDrafts[cat] || "").trim();
    if (!raw) return;
    const v = normalizeElement(cat, raw);
    const sc = scenes[desgloseId];
    const items = (cat === "CAST")
      ? (sc.elements?.CAST || sc.cast || [])
      : (sc.elements?.[cat] || []);
    if (items.includes(v)) {
      setElemDrafts({...elemDrafts, [cat]: ""});
      return;
    }
    const newItems = [...items, v];
    const patch = {elements: {...(sc.elements||{}), [cat]: newItems}};
    if (cat === "CAST") patch.cast = newItems;
    updateScene(desgloseId, patch);
    setElemDrafts({...elemDrafts, [cat]: ""});
  }

  function removeElementFromCurrent(cat, item) {
    if (!desgloseId) return;
    const sc = scenes[desgloseId];
    const source = (cat === "CAST")
      ? (sc.elements?.CAST || sc.cast || [])
      : (sc.elements?.[cat] || []);
    const items = source.filter(i => i !== item);
    const patch = {elements: {...(sc.elements||{}), [cat]: items}};
    if (cat === "CAST") patch.cast = items;
    updateScene(desgloseId, patch);
    // Also remove any script highlight for this text in this scene
    removeHighlightByText(desgloseId, item);
  }

  // ===== Category management =====
  // Renames a category. If the category has elements in any scenes, asks the
  // user whether to keep them under the new name or discard them.
  // CAST cannot be renamed (it has special storage in sc.cast for legacy reasons).
  function renameCategory(oldName, newName) {
    if (oldName === "CAST") { notify("La categoría CAST no se puede renombrar"); return; }
    const trimmed = (newName || "").trim();
    if (!trimmed) return;
    if (oldName === trimmed) return;
    if (VIRTUAL_CATEGORIES.includes(trimmed.toUpperCase())) {
      alert(`"${trimmed}" es un nombre reservado: la categoría LOCACIONES es automática y se llena desde los campos de cada escena.`);
      return;
    }
    if (categories.some(c => c.toLowerCase() === trimmed.toLowerCase())) {
      alert(`Ya existe una categoría llamada "${trimmed}".`);
      return;
    }
    // Count items
    let total = 0, sceneCount = 0;
    for (const sc of Object.values(scenes)) {
      const items = sc.elements?.[oldName] || [];
      if (items.length > 0) { total += items.length; sceneCount++; }
    }
    let keepItems = true;
    if (total > 0) {
      const msg = `La categoría "${oldName}" tiene ${total} elemento${total !== 1 ? "s" : ""} en ${sceneCount} escena${sceneCount !== 1 ? "s" : ""}.\n\n`+
        `¿Querés mantener los elementos en la nueva categoría "${trimmed}"?\n\n`+
        `• Aceptar = Mantener los elementos (se mueven a "${trimmed}")\n`+
        `• Cancelar = Borrar los elementos (la nueva categoría queda vacía)`;
      keepItems = confirm(msg);
    }
    pushUndo();
    const newList = categories.map(c => c === oldName ? trimmed : c);
    const newOrder = (current.desgloseOrder || categories).map(c => c === oldName ? trimmed : c);
    const newScenes = {};
    for (const [id, sc] of Object.entries(scenes)) {
      const els = sc.elements || {};
      const oldItems = els[oldName] || [];
      const { [oldName]: _drop, ...rest } = els;
      if (keepItems && oldItems.length > 0) rest[trimmed] = oldItems;
      newScenes[id] = { ...sc, elements: rest };
    }
    setProjects(prev => ({
      ...prev,
      [activeId]: { ...prev[activeId], categories: newList, desgloseOrder: newOrder, scenes: newScenes, updatedAt: Date.now() }
    }));
    if (activeCat === oldName) setActiveCat(trimmed);
    notify(`Categoría renombrada a "${trimmed}" ✓`);
  }

  function addCategory(rawName) {
    const name = (rawName || "").trim();
    if (!name) return;
    if (VIRTUAL_CATEGORIES.includes(name.toUpperCase())) {
      alert(`"${name}" es un nombre reservado: la categoría LOCACIONES es automática y se llena desde los campos de cada escena.`);
      return;
    }
    if (categories.some(c => c.toLowerCase() === name.toLowerCase())) {
      alert(`Ya existe una categoría llamada "${name}".`);
      return;
    }
    pushUndo();
    setProjects(prev => ({
      ...prev,
      [activeId]: { ...prev[activeId],
        categories: [...categories, name],
        desgloseOrder: [...(prev[activeId].desgloseOrder || categories), name],
        updatedAt: Date.now() }
    }));
    notify(`Categoría "${name}" creada ✓`);
  }

  function deleteCategory(name) {
    if (name === "CAST") { notify("La categoría CAST no se puede eliminar"); return; }
    let total = 0, sceneCount = 0;
    for (const sc of Object.values(scenes)) {
      const items = sc.elements?.[name] || [];
      if (items.length > 0) { total += items.length; sceneCount++; }
    }
    const msg = total > 0
      ? `Eliminar "${name}" borrará ${total} elemento${total !== 1 ? "s" : ""} en ${sceneCount} escena${sceneCount !== 1 ? "s" : ""}. ¿Continuar?`
      : `¿Eliminar la categoría "${name}"?`;
    if (!confirm(msg)) return;
    pushUndo();
    const newList = categories.filter(c => c !== name);
    const newOrder = (current.desgloseOrder || categories).filter(c => c !== name);
    const newScenes = {};
    for (const [id, sc] of Object.entries(scenes)) {
      const { [name]: _drop, ...rest } = (sc.elements || {});
      newScenes[id] = { ...sc, elements: rest };
    }
    setProjects(prev => ({
      ...prev,
      [activeId]: { ...prev[activeId], categories: newList, desgloseOrder: newOrder, scenes: newScenes, updatedAt: Date.now() }
    }));
    if (activeCat === name) setActiveCat(newList[0] || "CAST");
    notify(`Categoría "${name}" eliminada ✓`);
  }

  // Reorder helper: drop the category at `fromIdx` of desgloseOrder so it
  // sits before the category at `toIdx`. Affects only the desglose page.
  function reorderDesglose(fromIdx, toIdx) {
    if (fromIdx === toIdx || fromIdx == null || toIdx == null) return;
    const order = [...desgloseOrder];
    const [moved] = order.splice(fromIdx, 1);
    order.splice(toIdx, 0, moved);
    setProjects(prev => ({
      ...prev,
      [activeId]: { ...prev[activeId], desgloseOrder: order, updatedAt: Date.now() }
    }));

  // ===== Strip insertions =====

    const next = nb[idx+1];

  function defaultInsertIdx() {

  function applySort(option){
    if(!option) return;
    const boneIdx = board.findIndex(s=>s.type==="boneyard_sep");
    const cutoff  = boneIdx>=0 ? boneIdx : board.length;
    const scheduledItems = board.slice(0,cutoff);
    const boneyardItems  = board.slice(cutoff);
    const dividers = scheduledItems.filter(s=>s.type!=="scene");
    const sceneStrips = scheduledItems.filter(s=>s.type==="scene");
    if(dividers.length>0){
      if(!confirm(`Esto reordenará tus escenas y eliminará ${dividers.length} divisor(es) actuales (day breaks, días libres, banners). Los puedes volver a agregar después. ¿Continuar?`)) return;
    }
    const sorted = [...sceneStrips].sort((a,b)=>{
      const sa=scenes[a.id], sb=scenes[b.id];
      if(!sa||!sb) return 0;
      switch(option){
        case "scene_num": return (parseFloat(sa.num)||0) - (parseFloat(sb.num)||0);
        case "location":  return (sa.location||"").localeCompare(sb.location||"");
        case "set":       return (sa.set||"").localeCompare(sb.set||"");
        case "location_set": {
          const ka=`${sa.location||""}|${sa.set||""}`;
          const kb=`${sb.location||""}|${sb.set||""}`;
          return ka.localeCompare(kb);
        }
        case "cast":       return ((sa.cast||[])[0]||"ZZZ").localeCompare((sb.cast||[])[0]||"ZZZ");
        case "int_ext":    return sa.intExt.localeCompare(sb.intExt);
        case "day_night":  return sa.dayNight.localeCompare(sb.dayNight);
        case "pages_desc": return parsePags(sb.pages) - parsePags(sa.pages);
        case "pages_asc":  return parsePags(sa.pages) - parsePags(sb.pages);
        default: return 0;
      }
    });
    const newBoard = [...sorted, ...boneyardItems];
    setBoard(newBoard);
    const label = SORT_OPTIONS.find(o=>o[0]===option)?.[1] || "";
    notify(`Ordenado por ${label} ✓`);
  }

  const stats=useMemo(()=>{
    let sched=0,schedPgs=0,bone=0,bonePgs=0,inBone=false,days=0;
    for(const s of board){
      if(s.type==="boneyard_sep"){inBone=true;continue;}
      if(s.type==="daybreak"){if(!inBone)days++;continue;}
      if(s.type==="scene"){
        const sc=scenes[s.id]; if(!sc) continue;
        const p=parsePags(sc.pages);
        if(inBone){bone++;bonePgs+=p;}else{sched++;schedPgs+=p;}
      }

    return{sched,schedPgs,bone,bonePgs,days};
  },[board,scenes]);

  // Calculated dates for daybreaks/dayoffs based on startDate
  const stripDates = useMemo(() =>
    computeStripDates(board, startDate, weeklyDaysOff, holidays)

  // Map: { stripIdx → segment } where segment is the day-segment ending at that index
  // Used to render "FIN DE JORNADA N" rows after the last scene of each day.
  const endOfDayAtIdx = useMemo(() => {
    const segments = computeDaySegments(board, scenes, stripDates);
    const map = {};
    for (const seg of segments) map[seg.endIdx] = seg;
    return map;

  // Per-scene computed timing { sceneId: { start, end, isFirstOfDay } }
  // Start of first scene of day = scene.startTime (if set)
  // Start of subsequent scenes = previous scene's computed end
  // End = start + duration (in minutes)
  const sceneTiming = useMemo(() => {
    const map = {};
    let currentTime = null;
    let isFirstOfDay = true;
    let inBoneyard = false;
    for (const strip of board) {
      if (strip.type === "boneyard_sep") { inBoneyard = true; continue; }
      if (inBoneyard) continue;
      if (strip.type === "daybreak" || strip.type === "dayoff") {
        currentTime = null;
        isFirstOfDay = true;
        continue;
      }
      // Decorative banners are pure visual labels — ignored for timing
      if (strip.type === "banner" && strip.decorative) continue;
      // Banners with breaksDay also reset the clock
      if (strip.type === "banner" && strip.breaksDay) {
        currentTime = null;
        isFirstOfDay = true;
        continue;
      }
      // Banners (regular): can be first-of-day with their own startTime, and consume duration
      if (strip.type === "banner") {
        const dur = parseInt(strip.duration) || 0;
        // If first activity of day, banner can have its own startTime
        if (isFirstOfDay && strip.startTime) currentTime = strip.startTime;
        const bStart = currentTime;
        const bEnd = (bStart && dur > 0) ? addMinutes(bStart, dur) : bStart;
        map[strip.id] = { start: bStart, end: bEnd, isFirstOfDay, duration: dur, isBanner: true };
        if (dur > 0 && currentTime) currentTime = bEnd;
        if (currentTime) isFirstOfDay = false;
        continue;
      }
      if (strip.type !== "scene") continue;
      const sc = scenes[strip.id];
      if (!sc) continue;
      if (isFirstOfDay && sc.startTime) currentTime = sc.startTime;
      const start = currentTime;
      const dur = parseInt(sc.duration) || 0;
      const end = (start && dur > 0) ? addMinutes(start, dur) : start;
      map[sc.id] = { start, end, isFirstOfDay, duration: dur };
      currentTime = end;
      isFirstOfDay = false;
    }
    return map;
  }, [board, scenes]);

  // Per-daybreak: the start hour and end hour of that jornada (looking at last scene/banner)
  const dayStartEndTimes = useMemo(() => {
    const map = {};
    let inBoneyard = false;
    let currentDaybreakId = null;
    let dayStart = null;
    let dayEnd = null;
    for (const strip of board) {
      if (strip.type === "boneyard_sep") { inBoneyard = true; continue; }
      if (inBoneyard) continue;
      if (strip.type === "daybreak") {
        // Save previous
        if (currentDaybreakId) map[currentDaybreakId] = { start: dayStart, end: dayEnd };
        currentDaybreakId = strip.id;
        dayStart = null;
        dayEnd = null;
        continue;
      }
      if (strip.type === "dayoff" || (strip.type === "banner" && strip.breaksDay)) {
        if (currentDaybreakId) map[currentDaybreakId] = { start: dayStart, end: dayEnd };
        currentDaybreakId = null;
        dayStart = null;
        dayEnd = null;
        continue;
      }
      if (strip.type === "scene" || (strip.type === "banner" && !strip.breaksDay && !strip.decorative)) {
        const t = sceneTiming[strip.id];
        if (t) {
          if (!dayStart && t.start) dayStart = t.start;
          if (t.end) dayEnd = t.end;
          else if (t.start) dayEnd = t.start;
        }
      }
    }
    if (currentDaybreakId) map[currentDaybreakId] = { start: dayStart, end: dayEnd };
    return map;
  }, [board, scenes, sceneTiming]);

  // Build a per-date map of activities for the calendar view
  // { "YYYY-MM-DD": { dayNumber, scenes:[scene objects], type:"shoot"|"dayoff" } }
  const calendarActivity = useMemo(() => {
    const map = {};
    if (!startDate) return map;
    let inBoneyard = false;
    let currentDate = null;
    let currentEntry = null;
    for (const strip of board) {
      if (strip.type === "boneyard_sep") { inBoneyard = true; continue; }
      if (inBoneyard) continue;
      if (strip.type === "daybreak" || strip.type === "dayoff") {
        const info = stripDates[strip.id];
        if (!info) continue;
        currentDate = info.date;
        currentEntry = map[currentDate] = { dayNumber: info.dayNumber, scenes: [], type: strip.type === "dayoff" ? "dayoff" : "shoot", label: strip.label };
      } else if (strip.type === "scene" && currentEntry) {
        const sc = scenes[strip.id];
        if (sc) currentEntry.scenes.push(sc);
      }
    }
    return map;
  }, [board, scenes, stripDates, startDate]);

  const TITLE_CASE_CATS_SET = new Set(["CAST", "EXTRAS", "STUNTS"]);
  function normalizeElementRead(cat, value) {
    const v = (value || "").trim();
    if (!v) return v;
    if (TITLE_CASE_CATS_SET.has(cat)) {
      return v.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
    }
    return v.charAt(0).toUpperCase() + v.slice(1);
  }

  const allElements=useMemo(()=>{
    const map={}; categories.forEach(c=>map[c]=[]);
    VIRTUAL_CATEGORIES.forEach(c=>map[c]=[]);
    for(const sc of Object.values(scenes)){
      // CAST: legacy scenes store cast in sc.cast, newer ones in sc.elements.CAST — merge both
      const castItems = [
        ...(sc.cast || []),
        ...(sc.elements?.CAST || [])
      ];
      castItems.forEach(raw=>{ 
        const item = normalizeElementRead("CAST", raw);
        if(map.CAST && item && !map.CAST.includes(item)) map.CAST.push(item); 
      });
      // All other categories from sc.elements
      for(const [cat,items] of Object.entries(sc.elements||{})){
        if(cat === "CAST") continue;
        if(map[cat]) items.forEach(raw=>{ 
          const item = normalizeElementRead(cat, raw);
          if(item && !map[cat].includes(item)) map[cat].push(item); 
        });
      }
      if (sc.location && !map.LOCACIONES.includes(sc.location)) map.LOCACIONES.push(sc.location);
    }
    return map;
  },[scenes, categories]);

  function getDayPages(stripId){
    let total=0,found=false;
    for(const s of board){
      if(s.id===stripId){found=true;continue;}
      if(found){
        if(s.type==="daybreak"||s.type==="dayoff"||s.type==="boneyard_sep") break;
        if(s.type==="scene"&&scenes[s.id]) total+=parsePags(scenes[s.id].pages);
      }
    }
    return total;
  }
  function isInBoneyard(id){
    let inBone=false;
    for(const s of board){
      if(s.type==="boneyard_sep") inBone=true;
      if(s.id===id&&s.type==="scene") return inBone;
    }
    return false;
  }

  function importProject(e) {
    const file = e.target.files?.[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        let imported;
        if (data._format !== "stripboard_project") { alert("Este archivo no parece ser un proyecto de Stripboard válido."); return; }
        if (data._version === 2 && data.project) imported = migrateProject(data.project);
        else if (data.scenes && data.board) {
          imported = migrateProject({ id: uid("p"), name: data.project || "Proyecto importado", scenes: data.scenes, board: data.board, updatedAt: Date.now() });
        }
        else { alert("Formato no reconocido."); return; }
        const newProj = { ...imported, id: uid("p"), updatedAt: Date.now() };
        setProjects(prev => ({ ...prev, [newProj.id]: newProj }));
        setActiveId(newProj.id);
        setShowProjectsModal(false);
        notify(`"${newProj.name}" cargado ✓`);
      } catch (err) { alert("No se pudo leer el archivo. ¿Es un .stripboard.json válido?"); }
    };
    reader.readAsText(file);
  }

  function duplicateProject(id) {

    const newVersions = (cloned.versions||[]).map(v => ({ ...v, id: uid("v"), createdAt: Date.now(), updatedAt: Date.now() }));
    const newActiveVId = newVersions[newVersions.findIndex(v => v.id === cloned.versions?.find((_,i)=>i===0)?.id) >= 0 ? 0 : 0]?.id || newVersions[0]?.id;
    const copy = { ...cloned, id: uid("p"), name: `${orig.name} (copia)`, versions: newVersions, activeVersionId: newVersions[0]?.id, updatedAt: Date.now() };
    setProjects(prev => ({ ...prev, [copy.id]: copy }));
    notify("Proyecto duplicado ✓");

  // ===== Styles =====
