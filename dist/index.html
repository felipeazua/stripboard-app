  // ── Export PDF ──────────────────────────────────────────────────────
  function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"letter" });
    const PW = 215.9, PH = 279.4;
    const ML = 10, MR = 10, MT = 10;
    const contentW = PW - ML - MR;

    function hex(h) {
      const n = parseInt((h||"#888888").replace("#",""),16);
      return [(n>>16)&255,(n>>8)&255,n&255];
    }

    // Full date string like "Martes 5 Mayo 2026"
    function fullDate(isoStr) {
      if (!isoStr) return "";
      const d = parseISODate(isoStr);
      if (!d) return isoStr;
      return DAY_NAMES_LONG[d.getDay()] + " " + d.getDate() + " " + MONTH_NAMES[d.getMonth()] + " " + d.getFullYear();
    }

    // Draw small white banner icon using jsPDF primitives (mirrors the SVG icons on screen)
    function drawBannerIcon(bannerType, cx, cy) {
      doc.setDrawColor(255,255,255);
      doc.setFillColor(255,255,255);
      doc.setLineWidth(0.38);
      const s = 1.2;
      switch(bannerType) {
        case "desayuno": {
          // Mug body + handle + steam
          const bx = cx - s * 0.9, by = cy - s * 0.7;
          doc.rect(bx, by, s * 1.8, s * 1.4, "S");
          doc.line(bx + s * 1.8, by + s * 0.28, bx + s * 2.4, by + s * 0.28);
          doc.line(bx + s * 1.8, by + s * 0.9,  bx + s * 2.4, by + s * 0.9);
          doc.line(bx + s * 2.4, by + s * 0.28, bx + s * 2.4, by + s * 0.9);
          doc.line(cx - s * 0.35, by - s * 0.28, cx - s * 0.35, by - s * 0.8);
          doc.line(cx + s * 0.35, by - s * 0.28, cx + s * 0.35, by - s * 0.8);
          break;
        }
        case "almuerzo": {
          const lx = cx - s * 0.65, rx = cx + s * 0.65;
          const ty = cy - s, by2 = cy + s;
          doc.line(lx, ty, lx, by2);
          doc.line(lx - s * 0.3, ty, lx - s * 0.3, ty + s * 0.65);
          doc.line(lx + s * 0.3, ty, lx + s * 0.3, ty + s * 0.65);
          doc.line(rx, ty, rx, by2);
          doc.line(rx, ty, rx + s * 0.38, ty + s * 0.5);
          break;
        }
        case "set_change": {
          doc.line(cx - s,   cy + s * 0.8, cx - s,   cy - s * 0.1);
          doc.line(cx + s,   cy + s * 0.8, cx + s,   cy - s * 0.1);
          doc.line(cx - s,   cy + s * 0.8, cx + s,   cy + s * 0.8);
          doc.line(cx - s * 1.2, cy - s * 0.1, cx, cy - s);
          doc.line(cx + s * 1.2, cy - s * 0.1, cx, cy - s);
          break;
        }
        case "loc_change": {
          doc.rect(cx - s * 1.1, cy - s * 0.6, s * 1.8, s * 1.1, "S");
          doc.rect(cx + s * 0.7, cy - s * 0.6, s * 0.7, s * 0.8, "S");
          doc.circle(cx - s * 0.5, cy + s * 0.65, s * 0.33, "S");
          doc.circle(cx + s * 0.75, cy + s * 0.65, s * 0.33, "S");
          break;
        }
        case "second_unit": {
          doc.line(cx - s * 0.7, cy - s * 0.9, cx - s * 0.7, cy + s * 0.9);
          doc.line(cx - s * 0.7, cy - s * 0.9, cx + s * 0.9, cy);
          doc.line(cx - s * 0.7, cy + s * 0.9, cx + s * 0.9, cy);
          break;
        }
        case "scene_prep": {
          doc.circle(cx, cy - s * 0.35, s * 0.7, "S");
          doc.rect(cx - s * 0.38, cy + s * 0.35, s * 0.76, s * 0.5, "S");
          doc.line(cx - s * 0.28, cy + s * 0.88, cx + s * 0.28, cy + s * 0.88);
          break;
        }
        case "travel": {
          doc.line(cx - s * 1.1, cy, cx + s * 1.1, cy);
          doc.line(cx - s * 0.15, cy, cx - s * 0.15, cy - s * 0.9);
          doc.line(cx - s * 0.45, cy - s * 0.55, cx + s * 0.25, cy - s * 0.55);
          doc.line(cx + s * 0.45, cy, cx + s * 0.45, cy + s * 0.45);
          break;
        }
        default: break;
      }
    }

    // Banner label text
    function bannerLabelText(strip) {
      return (strip.label || "BANNER").toUpperCase();
    }

    // Draw time icon in icon column — draws actual SVG-like shapes using jsPDF primitives
    function drawTimeIcon(dayNight, x, y, w, h, rgb, bgRgb) {
      const cx = x + w / 2;
      const cy = y + h / 2;
      doc.setDrawColor(...rgb);
      doc.setFillColor(...rgb);
      doc.setLineWidth(0.45);

      switch(dayNight) {
        case "DAY":
        case "MORNING":
        case "AFTERNOON": {
          // Sun: tighter circle + shorter rays
          const r = 0.72;
          doc.circle(cx, cy, r, "F");
          const rays = 8;
          for (let i = 0; i < rays; i++) {
            const angle = (i * Math.PI * 2) / rays - Math.PI / 2;
            const x1 = cx + Math.cos(angle) * (r + 0.52);
            const y1 = cy + Math.sin(angle) * (r + 0.52);
            const x2 = cx + Math.cos(angle) * (r + 1.02);
            const y2 = cy + Math.sin(angle) * (r + 1.02);
            doc.line(x1, y1, x2, y2);
          }
          break;
        }
        case "NIGHT": {
          // Smaller crescent
          const r = 1.05;
          doc.circle(cx, cy, r, "F");
          if (bgRgb) {
            doc.setFillColor(...bgRgb);
            doc.circle(cx + r * 0.55, cy - r * 0.15, r * 0.78, "F");
          }
          break;
        }
        case "DAWN": {
          const r = 0.82;
          const baseY = cy + 0.38;
          doc.circle(cx, baseY, r, "F");
          if (bgRgb) {
            doc.setFillColor(...bgRgb);
            doc.rect(cx - r - 0.3, baseY, (r + 0.3) * 2, r + 0.8, "F");
          }
          doc.setDrawColor(...rgb);
          doc.setLineWidth(0.35);
          doc.line(cx - 1.7, baseY, cx + 1.7, baseY);
          break;
        }
        case "DUSK": {
          const r = 0.82;
          const baseY = cy - 0.22;
          doc.circle(cx, baseY, r, "F");
          if (bgRgb) {
            doc.setFillColor(...bgRgb);
            doc.rect(cx - r - 0.3, baseY, (r + 0.3) * 2, r + 0.8, "F");
          }
          doc.setDrawColor(...rgb);
          doc.setLineWidth(0.35);
          doc.line(cx - 1.7, baseY, cx + 1.7, baseY);
          break;
        }
        case "MAGIC_HOUR": {
          const pts = [];
          for (let i = 0; i < 8; i++) {
            const angle = (i * Math.PI) / 4 - Math.PI / 2;
            const rr = i % 2 === 0 ? 1.1 : 0.45;
            pts.push([cx + Math.cos(angle) * rr, cy + Math.sin(angle) * rr]);
          }
          doc.setLineWidth(0.28);
          for (let i = 0; i < pts.length; i++) {
            const [x1, y1] = pts[i];
            const [x2, y2] = pts[(i + 1) % pts.length];
            doc.line(x1, y1, x2, y2);
          }
          break;
        }
        default: {
          doc.setTextColor(...rgb);
          doc.setFont("helvetica","bold"); doc.setFontSize(5);
          doc.text("·", cx, cy + 1.5, { align: "center" });
        }
      }
    }

    // Banner type text labels (clean ASCII, no emoji)
    function bannerIconText(bannerType) {
      return {
        desayuno:    "DESAYUNO",
        almuerzo:    "ALMUERZO",
        set_change:  "CAMBIO SET",
        loc_change:  "CAMBIO LOC.",
        second_unit: "2da UNIDAD",
        scene_prep:  "PREP ESCENA",
        travel:      "VIAJE",
        section:     "SECCION",
        other:       "",
      }[bannerType] || "";
    }

    // Columns: icon | num | IE | loc+synopsis | cast | pages | inicio | fin
    const COLS = [
      { key:"icon",   w:8  },
      { key:"num",    w:11 },
      { key:"ie",     w:16 },
      { key:"loc",    w:60 },
      { key:"cast",   w:46 },
      { key:"pages",  w:13 },
      { key:"inicio", w:17 },
      { key:"fin",    w:17 },
    ];
    const totalW = COLS.reduce((a,c)=>a+c.w,0);
    const sc2 = contentW/totalW;
    let cx = ML;
    const CP = COLS.map(c=>{ const x=cx; cx+=c.w*sc2; return {...c,x,w:c.w*sc2}; });
    const col = k => CP.find(c=>c.key===k);

    const ROW_H  = 7;
    const BAND_H = 5.5;
    const EOD_H  = 5;
    const HDR_H  = 9;
    let y = MT;

    function newPage() { doc.addPage(); y = MT; drawHeader(); }
    function check(h) { if (y+h > PH-12) newPage(); }

    function drawHeader() {
      const statsStr =
        stats.sched + (stats.sched===1?" escena":" escenas") + "  |  " +
        fmtPags(stats.schedPgs) + " " + (Number(fmtPags(stats.schedPgs))===1?"página":"páginas") + "  |  " +
        stats.days + (stats.days===1?" jornada":" jornadas");
      doc.setFillColor(17,17,17);
      doc.rect(ML, y, contentW, HDR_H, "F");
      doc.setTextColor(255,255,255);
      doc.setFont("helvetica","normal"); doc.setFontSize(7);
      doc.text(statsStr, ML+3, y+HDR_H*0.62);
      doc.setFont("helvetica","bold"); doc.setFontSize(8.5);
      doc.text(project, PW/2, y+HDR_H*0.62, {align:"center"});
      doc.setFont("helvetica","normal"); doc.setFontSize(7);
      doc.text(activeVersion.name, PW-MR-2, y+HDR_H*0.62, {align:"right"});
      y += HDR_H + 0.5;
      // Column headers
      doc.setFillColor(40,40,40);
      doc.rect(ML, y, contentW, 4.5, "F");
      doc.setTextColor(200,200,200);
      doc.setFont("helvetica","bold"); doc.setFontSize(5.5);
      const hdrs = {num:"ESC",ie:"INT/EXT",loc:"LOCACIÓN / SET / SINOPSIS",cast:"CAST",pages:"PÁGS",inicio:"INICIO",fin:"FIN"};
      CP.forEach(c => {
        if (c.key==="icon") return;
        const label = hdrs[c.key]||"";
        if (c.key==="loc") doc.text(label, c.x+2, y+3.2);
        else doc.text(label, c.x+c.w/2, y+3.2, {align:"center"});
      });
      y += 4.5 + 0.3;
    }

    // ── Draw FIN DE JORNADA row ──────────────────────────────
    function drawEOD() {
      if (dayNum === 0 || scenesInDay === 0) return;
      check(EOD_H);
      const dateLabel = fullDate(currentDayDate);
      doc.setFillColor(...hex("#475569"));
      doc.rect(ML, y, contentW, EOD_H, "F");
      doc.setTextColor(255,255,255);
      doc.setFont("helvetica","normal"); doc.setFontSize(6);
      doc.text("TOTAL ESCENAS: "+scenesInDay, ML+4, y+EOD_H*0.65);
      doc.setFont("helvetica","bold"); doc.setFontSize(6.5);
      const mid = "— FIN JORNADA "+dayNum+(dateLabel?" — "+dateLabel:"")+" —";
      doc.text(mid, PW/2, y+EOD_H*0.65, {align:"center"});
      doc.setFont("helvetica","normal"); doc.setFontSize(6);
      doc.text(fmtPags(eighthsInDay)+" pág", PW-MR-3, y+EOD_H*0.65, {align:"right"});
      y += EOD_H + 0.5;
      // reset so we don't draw twice
      scenesInDay = 0; eighthsInDay = 0;
    }

    // ── COVER PAGE ─────────────────────────────────────────────
    const allDates = Object.values(stripDates).map(d=>d.date).filter(Boolean).sort();
    const firstDate = allDates[0] ? fullDate(allDates[0]) : "";
    const lastDate  = allDates[allDates.length-1] ? fullDate(allDates[allDates.length-1]) : "";
    const exportDate = (() => {
      const d = new Date();
      return DAY_NAMES_LONG[d.getDay()] + " " + d.getDate() + " " + MONTH_NAMES[d.getMonth()] + " " + d.getFullYear();
    })();

    // Helper: draw circle (outline only) with dark number centered
    function drawCircleNum(num, cx, cy, r) {
      doc.setDrawColor(80,80,80); doc.setLineWidth(0.5);
      doc.circle(cx, cy, r, "S");
      doc.setTextColor(20,20,20);
      doc.setFont("helvetica","bold");
      doc.setFontSize(r * 4.2);
      // vertically center: baseline sits at cy + r*0.38 (empirical for helvetica)
      doc.text(String(num), cx, cy + r * 0.38, {align:"center"});
    }

    const LX = ML;
    const RX = PW - MR;

    // ── COVER HEADER — inline label: value on same line ──────────
    let coverY = MT;

    // Inline label+value on one line
    function coverInline(label, value, x, y2) {
      doc.setFont("helvetica","normal"); doc.setFontSize(8);
      doc.setTextColor(140,140,140);
      const lw = doc.getTextWidth(label + " ");
      doc.text(label, x, y2);
      doc.setFont("helvetica","bold"); doc.setFontSize(8);
      doc.setTextColor(15,15,15);
      doc.text(value.toUpperCase(), x + lw, y2);
    }

    // Helper for two-line coverField (used for RODAJE DESDE / HASTA)
    function coverField(label, value, x, y2) {
      doc.setFont("helvetica","normal"); doc.setFontSize(7);
      doc.setTextColor(140,140,140);
      doc.text(label, x, y2);
      doc.setFont("helvetica","bold"); doc.setFontSize(9);
      doc.setTextColor(15,15,15);
      doc.text(value.toUpperCase(), x, y2 + 5.5);
    }

    // Row 1: PELÍCULA: nombre   |   VERSIÓN DE PLAN DE RODAJE: nombre
    coverInline("PELÍCULA:", project, LX, coverY + 5);
    coverInline("VERSIÓN DE PLAN DE RODAJE:", activeVersion.name, LX + contentW*0.45, coverY + 5);
    coverY += 12;

    // Thin separator
    doc.setDrawColor(210,210,210); doc.setLineWidth(0.35);
    doc.line(LX, coverY, LX+contentW, coverY);
    coverY += 10;

    // ── Stats block — uniform small font, same size as table text
    const statItems = [
      { value: String(stats.days),              label: stats.days===1 ? "JORNADA" : "JORNADAS" },
      { value: String(stats.sched),             label: stats.sched===1 ? "ESCENA" : "ESCENAS"  },
      { value: fmtPags(stats.schedPgs)+" pág.", label: "PÁGINAS GUIÓN"                         },
    ];
    const statBlockY = coverY + 6;
    const statColW = contentW / statItems.length;
    statItems.forEach((item, i) => {
      const sx = ML + statColW * i + statColW / 2;
      // Same font size as table rows (6pt bold for value, 5.5pt normal for label)
      doc.setFont("helvetica","bold"); doc.setFontSize(11);
      doc.setTextColor(15,15,15);
      doc.text(item.value, sx, statBlockY, {align:"center"});
      doc.setFont("helvetica","normal"); doc.setFontSize(6);
      doc.setTextColor(120,120,120);
      doc.text(item.label, sx, statBlockY + 5, {align:"center"});
      if (i < statItems.length - 1) {
        doc.setDrawColor(210,210,210); doc.setLineWidth(0.4);
        doc.line(ML + statColW*(i+1), statBlockY-8, ML + statColW*(i+1), statBlockY+7);
      }
    });
    coverY = statBlockY + 14;

    // ── Separator ──
    doc.setDrawColor(220,220,220); doc.setLineWidth(0.35);
    doc.line(LX, coverY, LX+contentW, coverY);
    coverY += 10;

    // ── COLOR LEGEND — explain the strip color code ──
    doc.setFont("helvetica","bold"); doc.setFontSize(7);
    doc.setTextColor(100,100,100);
    doc.text("CÓDIGO DE COLORES", LX, coverY);
    coverY += 5;

    // Build legend items (label, bg color, text color)
    const legendItems = [
      { label: "DÍA INT",   bg: COLOR_PALETTE.WHITE.bg,  text: COLOR_PALETTE.WHITE.text  },
      { label: "DÍA EXT",   bg: COLOR_PALETTE.YELLOW.bg, text: COLOR_PALETTE.YELLOW.text },
      { label: "NOCHE INT", bg: COLOR_PALETTE.GREEN.bg,  text: COLOR_PALETTE.GREEN.text  },
      { label: "NOCHE EXT", bg: COLOR_PALETTE.BLUE.bg,   text: COLOR_PALETTE.BLUE.text   },
      { label: "AMANECER",  bg: COLOR_PALETTE.PINK.bg,   text: COLOR_PALETTE.PINK.text   },
      { label: "ATARDECER", bg: COLOR_PALETTE.ORANGE.bg, text: COLOR_PALETTE.ORANGE.text },
      { label: "MAGIC HOUR",bg: COLOR_PALETTE.PURPLE.bg, text: COLOR_PALETTE.PURPLE.text },
    ];
    // Layout: chips fit in one row across contentW
    const chipH  = 5.5;
    const chipGap = 2;
    const chipW = (contentW - chipGap * (legendItems.length - 1)) / legendItems.length;
    legendItems.forEach((it, i) => {
      const cxL = LX + i * (chipW + chipGap);
      doc.setFillColor(...hex(it.bg));
      doc.rect(cxL, coverY, chipW, chipH, "F");
      // subtle border for the white chip so it's visible on white paper
      doc.setDrawColor(210,210,210); doc.setLineWidth(0.15);
      doc.rect(cxL, coverY, chipW, chipH, "S");
      doc.setTextColor(...hex(it.text));
      doc.setFont("helvetica","bold"); doc.setFontSize(5.5);
      doc.text(it.label, cxL + chipW/2, coverY + chipH*0.68, {align:"center"});
    });
    coverY += chipH + 6;

    // ── Separator ──
    doc.setDrawColor(220,220,220); doc.setLineWidth(0.35);
    doc.line(LX, coverY, LX+contentW, coverY);
    coverY += 10;

    // ── RODAJE DESDE / HASTA ──
    if (firstDate || lastDate) {
      coverField("RODAJE DESDE:", firstDate||"—", LX, coverY);
      coverField("HASTA:", lastDate||"—", LX + contentW*0.5, coverY);
      coverY += 18;
    }

    // ── Separator ──
    doc.setDrawColor(220,220,220); doc.setLineWidth(0.35);
    doc.line(LX, coverY, LX+contentW, coverY);
    coverY += 8;

    // ── Per-jornada summary table ──
    doc.setFont("helvetica","bold"); doc.setFontSize(7);
    doc.setTextColor(100,100,100);
    doc.text("RESUMEN POR JORNADA", LX, coverY);
    coverY += 6;

    // Build per-day data
    const dayRows = [];
    let tDayNum2 = 0;
    for (let bi2 = 0; bi2 < board.length; bi2++) {
      const strip = board[bi2];
      if (strip.type === "boneyard_sep") break;
      const isDb = strip.type === "daybreak" || (strip.type === "banner" && strip.breaksDay);
      if (!isDb) continue;
      tDayNum2++;
      const info = stripDates[strip.id] || {};
      const dDate = info.date ? fullDate(info.date) : "—";
      let dScenes = 0, dPages = 0, sceneNums = [];
      let counting2 = false;
      for (const s of board) {
        if (s.id === strip.id) { counting2 = true; continue; }
        if (!counting2) continue;
        if (s.type==="daybreak"||s.type==="dayoff"||s.type==="boneyard_sep"||(s.type==="banner"&&s.breaksDay)) break;
        if (s.type==="scene" && scenes[s.id]) {
          dScenes++;
          dPages += parsePags(scenes[s.id].pages);
          sceneNums.push(scenes[s.id].num || s.id);
        }
      }
      const dTimes = dayStartEndTimes[strip.id] || {};
      dayRows.push({ dayNum: tDayNum2, date: dDate, sceneCount: dScenes, pages: dPages, sceneNums, times: dTimes });
    }

    // Boneyard scenes
    const boneyardScenes = [];
    let inBoneyard = false;
    for (const s of board) {
      if (s.type === "boneyard_sep") { inBoneyard = true; continue; }
      if (inBoneyard && s.type === "scene" && scenes[s.id]) boneyardScenes.push(scenes[s.id]);
    }

    // Table columns
    const TC = {
      jornada: { x: LX,                  w: contentW*0.13 },
      fecha:   { x: LX+contentW*0.13,    w: contentW*0.22 },
      paginas: { x: LX+contentW*0.35,    w: contentW*0.13 },
      inicio:  { x: LX+contentW*0.48,    w: contentW*0.10 },
      fin:     { x: LX+contentW*0.58,    w: contentW*0.10 },
      total:   { x: LX+contentW*0.68,    w: contentW*0.10 },
      escenas: { x: LX+contentW*0.78,    w: contentW*0.22 },
    };

    // Table header
    const tableY = coverY;
    doc.setFillColor(25,25,25);
    doc.rect(LX, tableY, contentW, 6, "F");
    doc.setTextColor(200,200,200);
    doc.setFont("helvetica","bold"); doc.setFontSize(5.5);
    [
      { label:"JORNADA",    c:"jornada", align:"left"   },
      { label:"FECHA",      c:"fecha",   align:"left"   },
      { label:"PÁGINAS",    c:"paginas", align:"center" },
      { label:"INICIO",     c:"inicio",  align:"center" },
      { label:"FIN",        c:"fin",     align:"center" },
      { label:"TOTAL ESC.", c:"total",   align:"center" },
      { label:"ESCENAS",    c:"escenas", align:"left"   },
    ].forEach(h => {
      const c = TC[h.c];
      const x = h.align==="center" ? c.x+c.w/2 : c.x+2;
      doc.text(h.label, x, tableY+4, {align:h.align});
    });

    const ROW_TH = 7.5;
    let tRowY = tableY + 6;
    dayRows.forEach((row, i) => {
      doc.setFillColor(...(i%2===0 ? [255,255,255] : [248,248,248]));
      doc.rect(LX, tRowY, contentW, ROW_TH, "F");
      const midY = tRowY + ROW_TH/2;
      const textY = tRowY + ROW_TH*0.65;
      doc.setFont("helvetica","bold"); doc.setFontSize(6); doc.setTextColor(20,20,20);
      doc.text("JORNADA "+row.dayNum, TC.jornada.x+2, textY);
      doc.setFont("helvetica","normal"); doc.setFontSize(6);
      doc.text(row.date,                          TC.fecha.x+2,               textY);
      doc.text(fmtPags(row.pages)+" pág.",        TC.paginas.x+TC.paginas.w/2, textY, {align:"center"});
      doc.text(row.times.start||"—",             TC.inicio.x+TC.inicio.w/2,  textY, {align:"center"});
      doc.text(row.times.end||"—",               TC.fin.x+TC.fin.w/2,        textY, {align:"center"});
      // TOTAL ESC — small circle, same font size as rest of row
      const circR = 1.8;
      doc.setDrawColor(80,80,80); doc.setLineWidth(0.4);
      doc.circle(TC.total.x+TC.total.w/2, midY, circR, "S");
      doc.setFont("helvetica","bold"); doc.setFontSize(6); doc.setTextColor(20,20,20);
      doc.text(String(row.sceneCount), TC.total.x+TC.total.w/2, midY+circR*0.38, {align:"center"});
      doc.setFont("helvetica","normal"); doc.setFontSize(5.5); doc.setTextColor(60,60,60);
      let scDisplay = row.sceneNums.join(", ");
      const maxW = TC.escenas.w - 3;
      while (doc.getTextWidth(scDisplay) > maxW && scDisplay.includes(","))
        scDisplay = scDisplay.slice(0, scDisplay.lastIndexOf(","))+"…";
      doc.text(scDisplay, TC.escenas.x+2, textY);
      tRowY += ROW_TH;
    });
    doc.setDrawColor(200,200,200); doc.setLineWidth(0.3);
    doc.line(LX, tRowY, LX+contentW, tRowY);
    coverY = tRowY + 8;

    // ── POR CALENDARIZAR (boneyard) ──
    if (boneyardScenes.length > 0) {
      coverY += 4;
      doc.setFont("helvetica","bold"); doc.setFontSize(7);
      doc.setTextColor(100,100,100);
      doc.text("POR CALENDARIZAR", LX, coverY);
      coverY += 6;
      doc.setFillColor(60,60,60);
      doc.rect(LX, coverY, contentW, 5.5, "F");
      doc.setTextColor(200,200,200);
      doc.setFont("helvetica","bold"); doc.setFontSize(5.5);
      doc.text("ESC",    LX+2,                    coverY+3.8);
      doc.text("LOCACIÓN / SINOPSIS", LX+contentW*0.08+2, coverY+3.8);
      doc.text("CAST",   LX+contentW*0.60+2,      coverY+3.8);
      doc.text("PÁGS",   LX+contentW*0.88+2,      coverY+3.8);
      coverY += 5.5;
      boneyardScenes.forEach((sc, i) => {
        // Row height: taller when there's a synopsis so both lines fit
        const bRowH = sc.name ? 10 : 6.5;
        doc.setFillColor(...(i%2===0 ? [255,255,255] : [248,248,248]));
        doc.rect(LX, coverY, contentW, bRowH, "F");
        const ty = coverY + (sc.name ? 3.5 : 4.2);
        doc.setFont("helvetica","bold"); doc.setFontSize(5.5); doc.setTextColor(20,20,20);
        doc.text(String(sc.num||""), LX+2, ty);
        doc.setFont("helvetica","normal"); doc.setFontSize(5.5);
        const locStr = [sc.location, sc.set].filter(Boolean).join(" / ");
        let locDisp = locStr;
        while (doc.getTextWidth(locDisp) > contentW*0.52-3 && locDisp.length>4) locDisp=locDisp.slice(0,-2)+"…";
        doc.text(locDisp, LX+contentW*0.08+2, ty);
        if (sc.name) {
          doc.setFontSize(5);
          let synDisp = sc.name.split("\n")[0];
          while (doc.getTextWidth(synDisp) > contentW*0.52-3 && synDisp.length>4) synDisp=synDisp.slice(0,-2)+"…";
          doc.text(synDisp, LX+contentW*0.08+2, ty+3.2);
          doc.setFontSize(5.5);
        }
        const castStr = Array.isArray(sc.cast) ? sc.cast.join(", ") : (sc.cast||"");
        let castDisp = castStr;
        while (doc.getTextWidth(castDisp) > contentW*0.28-3 && castDisp.length>4) castDisp=castDisp.slice(0,-2)+"…";
        const midTy = coverY + bRowH/2 + 2;
        doc.text(castDisp, LX+contentW*0.60+2, midTy);
        doc.text(sc.pages ? String(sc.pages)+" pág." : "—", LX+contentW*0.88+2, midTy);
        coverY += bRowH;
      });
      doc.setDrawColor(200,200,200); doc.setLineWidth(0.3);
      doc.line(LX, coverY, LX+contentW, coverY);
    }

    // ── Footer ──
    doc.setFont("helvetica","normal"); doc.setFontSize(7);
    doc.setTextColor(160,160,160);
    doc.text("Exportado el "+exportDate, PW/2, PH-14, {align:"center"});
    doc.setDrawColor(200,200,200); doc.setLineWidth(0.3);
    doc.line(LX, PH-18, LX+contentW, PH-18);

    // Start the actual stripboard on a new page
    doc.addPage();
    drawHeader();
    // ── END COVER PAGE ──────────────────────────────────────────

    let rowIdx = 0, dayNum = 0, scenesInDay = 0, eighthsInDay = 0;
    let currentDayDate = "";

    for (let bi = 0; bi < board.length; bi++) {
      const strip = board[bi];

      // Before any day-boundary strip, flush the EOD row for the previous day
      if (strip.type === "boneyard_sep") { drawEOD(); break; }
      if (strip.type === "daybreak" || strip.type === "dayoff" ||
          (strip.type === "banner" && strip.breaksDay)) {
        drawEOD();
      }

      // ── DAYBREAK ── slate + full date
      if (strip.type === "daybreak") {
        check(BAND_H);
        const info = stripDates[strip.id] || {};
        currentDayDate = info.date || "";
        const dateLabel = fullDate(currentDayDate);
        dayNum++;
        const times = dayStartEndTimes[strip.id] || {};
        doc.setFillColor(...hex("#334155"));
        doc.rect(ML, y, contentW, BAND_H, "F");
        doc.setTextColor(255,255,255);
        // Day label centered
        doc.setFont("helvetica","bold"); doc.setFontSize(7.5);
        const dayLabel = "JORNADA " + dayNum + (dateLabel ? " — " + dateLabel : "");
        doc.text(dayLabel, PW/2, y+BAND_H*0.65, {align:"center"});
        // Time range: start in INICIO col, end in FIN col — same columns as scene rows
        const initCd = col("inicio");
        const finCd  = col("fin");
        doc.setFont("helvetica","normal"); doc.setFontSize(6);
        doc.text(times.start || "—", initCd.x + initCd.w / 2, y + BAND_H * 0.65, { align: "center" });
        doc.text(times.end   || "—", finCd.x  + finCd.w  / 2, y + BAND_H * 0.65, { align: "center" });
        y += BAND_H;
        rowIdx = 0;
        continue;
      }

      // ── DAYOFF ──
      if (strip.type === "dayoff") {
        check(BAND_H);
        const info = stripDates[strip.id] || {};
        const dateLabel = fullDate(info.date||"");
        doc.setFillColor(...hex("#F4E0E0"));
        doc.rect(ML, y, contentW, BAND_H, "F");
        doc.setTextColor(...hex("#7A2222"));
        doc.setFont("helvetica","bold"); doc.setFontSize(7);
        doc.text((strip.label||"DÍA LIBRE").toUpperCase() + (dateLabel?" — "+dateLabel:""), PW/2, y+BAND_H*0.65, {align:"center"});
        y += BAND_H;
        continue;
      }

      // ── BANNER ──
      if (strip.type === "banner") {
        check(BAND_H);
        const bgRgb = strip.bg ? hex(strip.bg) : [42,42,42];
        const fgRgb = strip.color ? hex(strip.color) : [255,255,255];
        const bannerTiming = sceneTiming[strip.id] || {};
        doc.setFillColor(...bgRgb);
        doc.rect(ML, y, contentW, BAND_H, "F");
        doc.setTextColor(...fgRgb);

        // Measure label text width to place icon just to its left, centered together
        doc.setFont("helvetica","bold"); doc.setFontSize(7);
        const labelStr = bannerLabelText(strip);
        const labelW = doc.getTextWidth(labelStr);
        const iconW = 3.5; // approx width the icon occupies
        const gap = 1.8;   // gap between icon and label
        const blockW = iconW + gap + labelW;
        const blockStartX = ML + contentW * 0.42 - blockW / 2; // center of content area
        const iconCx = blockStartX + iconW / 2;
        const labelX  = blockStartX + iconW + gap;
        const rowMidY = y + BAND_H / 2;
        const textBaseY = y + BAND_H * 0.65;

        // Draw icon at computed position (centered vertically in banner row)
        drawBannerIcon(strip.bannerType, iconCx, rowMidY);

        // Draw label to the right of the icon
        doc.setTextColor(...fgRgb);
        doc.setFont("helvetica","bold"); doc.setFontSize(7);
        doc.text(labelStr, labelX, textBaseY);

        // Timing: INICIO and FIN columns, same as scene rows
        doc.setFont("helvetica","normal"); doc.setFontSize(6);
        const initC2 = col("inicio");
        const finC2  = col("fin");
        doc.text(bannerTiming.start || "—", initC2.x + initC2.w / 2, textBaseY, { align: "center" });
        doc.text(bannerTiming.end   || "—", finC2.x  + finC2.w  / 2, textBaseY, { align: "center" });

        y += BAND_H;
        continue;
      }

      if (strip.type !== "scene") continue;
      const sc = scenes[strip.id];
      if (!sc) continue;

      // isLastScene: used only for check() pre-reservation — no longer draws EOD here
      // (EOD is now drawn when we hit the next daybreak/dayoff/boneyard_sep)

      check(ROW_H);

      const colInfo = getCol(sc.intExt, sc.dayNight);
      const bgRgb = hex(colInfo.bg);
      const fgRgb = hex(colInfo.text);

      // Check if previous scene (adjacent strip before this one) has the same color
      // so we can draw a subtle dashed separator instead of darkening alternating rows
      let prevSameColor = false;
      for (let k = bi - 1; k >= 0; k--) {
        const prev = board[k];
        if (prev.type === "boneyard_sep") break;
        if (prev.type === "scene") {
          const prevSc = scenes[prev.id];
          if (prevSc) {
            const prevCol = getCol(prevSc.intExt, prevSc.dayNight);
            prevSameColor = prevCol.bg === colInfo.bg;
          }
          break;
        }
        break; // any other strip type (banner, daybreak) = not same-color-adjacent
      }

      // Row bg — always solid base color (no alternating darkening)
      doc.setFillColor(...bgRgb);
      doc.rect(ML, y, contentW, ROW_H, "F");

      // Row border
      doc.setDrawColor(210,210,215);
      doc.setLineWidth(0.12);
      doc.rect(ML, y, contentW, ROW_H, "S");

      // If previous row had same color, draw a single thin solid darker line as separator
      if (prevSameColor) {
        doc.setDrawColor(...bgRgb.map(v => Math.max(0, v - 50)));
        doc.setLineWidth(0.3);
        doc.line(ML, y, ML + contentW, y);
      }

      doc.setTextColor(...fgRgb);

      // Icon col: draw graphical sun/moon/star icon
      const ic = col("icon");
      drawTimeIcon(sc.dayNight, ic.x, y, ic.w, ROW_H, fgRgb, bgRgb);
      // Reset text color after icon drawing (icon uses fill/draw colors)
      doc.setTextColor(...fgRgb);

      // Num
      const nc = col("num");
      doc.setFont("helvetica","bold"); doc.setFontSize(9);
      doc.text(String(sc.num||"—"), nc.x+nc.w/2, y+ROW_H*(sc.storyDay?0.40:0.65), {align:"center"});
      if (sc.storyDay) {
        doc.setFont("helvetica","normal"); doc.setFontSize(5);
        doc.text("DH"+sc.storyDay, nc.x+nc.w/2, y+ROW_H*0.78, {align:"center"});
      }

      // INT/EXT + day/night label — top: intExt only, bottom: time-of-day only
      const iec = col("ie");
      doc.setFont("helvetica","bold"); doc.setFontSize(5.5);
      doc.text(sc.intExt||"INT", iec.x+iec.w/2, y+ROW_H*0.36, {align:"center"});
      const tOpt = TIME_OPTIONS.find(o => o.value === sc.dayNight);
      const timeLabel = tOpt ? tOpt.label.toUpperCase() : (sc.dayNight || "");
      doc.setFont("helvetica","bold"); doc.setFontSize(5.5);
      doc.text(timeLabel, iec.x+iec.w/2, y+ROW_H*0.72, {align:"center"});

      // Location / Set / Synopsis
      const lc = col("loc");
      const locSet = [sc.location, sc.set].filter(Boolean).join(" / ");
      doc.setFont("helvetica","bold"); doc.setFontSize(6.5);
      if (locSet) {
        doc.text(doc.splitTextToSize(locSet, lc.w-3)[0], lc.x+2, y+ROW_H*(sc.name?0.32:0.62));
      }
      if (sc.name) {
        doc.setFont("helvetica","normal"); doc.setFontSize(5.8);
        doc.text(doc.splitTextToSize(sc.name.split("\n")[0], lc.w-3)[0], lc.x+2, y+ROW_H*(locSet?0.68:0.62));
      }

      // Cast
      const cc = col("cast");
      doc.setFont("helvetica","normal"); doc.setFontSize(6);
      const castStr = (sc.cast||[]).slice(0,5).join(", ");
      doc.text(doc.splitTextToSize(castStr, cc.w-3)[0]||"", cc.x+2, y+ROW_H*0.62);

      // Pages — show verbatim (e.g. "1 4/8", "2/8", "1") + "pág."
      const pc = col("pages");
      doc.setFont("helvetica","bold"); doc.setFontSize(6);
      const pagesStr = sc.pages ? String(sc.pages).trim() + " pág." : "—";
      doc.text(pagesStr, pc.x + pc.w / 2, y + ROW_H * 0.62, { align: "center" });

      // Timing: get from sceneTiming (computed useMemo)
      const tim = sceneTiming[strip.id] || {};
      const initC = col("inicio");
      doc.setFont("helvetica","normal"); doc.setFontSize(6);
      doc.text(tim.start||"—", initC.x+initC.w/2, y+ROW_H*0.62, {align:"center"});
      const finC = col("fin");
      doc.text(tim.end||"—", finC.x+finC.w/2, y+ROW_H*0.62, {align:"center"});

      eighthsInDay += sc.pages ? parseFloat(sc.pages) : 0;
      scenesInDay++; rowIdx++;
      y += ROW_H;
    }

    // Flush EOD for the last day if board ended without a boneyard_sep
    drawEOD();

    // ── POR CALENDARIZAR — boneyard scenes at end of stripboard ──
    if (boneyardScenes.length > 0) {
      check(BAND_H + boneyardScenes.length * ROW_H + 10);
      // Section separator gap
      y += 4;
      // Section header band
      doc.setFillColor(60,60,60);
      doc.rect(ML, y, contentW, BAND_H, "F");
      doc.setTextColor(255,255,255);
      doc.setFont("helvetica","bold"); doc.setFontSize(7);
      doc.text("POR CALENDARIZAR  —  "+boneyardScenes.length+" escena"+(boneyardScenes.length!==1?"s":""), PW/2, y+BAND_H*0.65, {align:"center"});
      y += BAND_H;

      boneyardScenes.forEach((sc, i) => {
        const bRowH2 = sc.name ? ROW_H + 2 : ROW_H;
        check(bRowH2);
        const colInfo = getCol(sc.intExt, sc.dayNight);
        const bgRgb = hex(colInfo.bg);
        const fgRgb = hex(colInfo.text);
        doc.setFillColor(...bgRgb);
        doc.rect(ML, y, contentW, bRowH2, "F");
        doc.setDrawColor(210,210,215); doc.setLineWidth(0.12);
        doc.rect(ML, y, contentW, bRowH2, "S");

        // Same-color separator
        if (i > 0) {
          const prevSc = boneyardScenes[i-1];
          const prevCol = getCol(prevSc.intExt, prevSc.dayNight);
          if (prevCol.bg === colInfo.bg) {
            doc.setDrawColor(...bgRgb.map(v=>Math.max(0,v-50)));
            doc.setLineWidth(0.3);
            doc.line(ML, y, ML+contentW, y);
          }
        }

        // Icon
        drawTimeIcon(sc.dayNight, col("icon").x, y, col("icon").w, ROW_H, fgRgb, bgRgb);
        doc.setTextColor(...fgRgb);

        // Scene number
        const nc = col("num");
        doc.setFont("helvetica","bold"); doc.setFontSize(7);
        doc.text(String(sc.num||""), nc.x+nc.w/2, y+ROW_H*0.62, {align:"center"});

        // INT/EXT + day/night
        const iec = col("ie");
        doc.setFont("helvetica","bold"); doc.setFontSize(5.5);
        doc.text(sc.intExt||"INT", iec.x+iec.w/2, y+ROW_H*0.36, {align:"center"});
        const tOpt2 = TIME_OPTIONS.find(o=>o.value===sc.dayNight);
        doc.text(tOpt2 ? tOpt2.label.toUpperCase() : (sc.dayNight||""), iec.x+iec.w/2, y+ROW_H*0.72, {align:"center"});

        // Location + synopsis — same fields as main rows
        const lc = col("loc");
        const locSet2 = [sc.location, sc.set].filter(Boolean).join(" / ");
        doc.setFont("helvetica","bold"); doc.setFontSize(6.5);
        if (locSet2) {
          doc.text(doc.splitTextToSize(locSet2, lc.w-3)[0], lc.x+2, y+ROW_H*(sc.name?0.32:0.62));
        }
        if (sc.name) {
          doc.setFont("helvetica","normal"); doc.setFontSize(5.8);
          doc.text(doc.splitTextToSize(sc.name.split("\n")[0], lc.w-3)[0], lc.x+2, y+ROW_H*(locSet2?0.68:0.62));
        }

        // Cast
        const cc = col("cast");
        const castTxt = Array.isArray(sc.cast)?sc.cast.join(", "):(sc.cast||"");
        let castDisp = castTxt;
        while (doc.getTextWidth(castDisp) > cc.w-3 && castDisp.length>2) castDisp=castDisp.slice(0,-2)+"…";
        doc.setFont("helvetica","normal"); doc.setFontSize(5.5);
        doc.text(castDisp, cc.x+2, y+ROW_H*0.62);

        // Pages
        const pc = col("pages");
        doc.setFont("helvetica","bold"); doc.setFontSize(6);
        doc.text(sc.pages ? String(sc.pages).trim()+" pág." : "—", pc.x+pc.w/2, y+ROW_H*0.62, {align:"center"});

        // No times (not scheduled)
        const initC = col("inicio");
        const finC  = col("fin");
        doc.setFont("helvetica","normal"); doc.setFontSize(6);
        doc.text("—", initC.x+initC.w/2, y+ROW_H*0.62, {align:"center"});
        doc.text("—", finC.x+finC.w/2,   y+ROW_H*0.62, {align:"center"});

        y += bRowH2;
      });
    }

    // ── PAGE FOOTER — draw on every page after content is finalized ──
    // Footer: project · version · generated date · page X of Y
    const _now = new Date();
    const _pad = n => String(n).padStart(2,"0");
    const genShort = `${_pad(_now.getDate())} ${MONTH_NAMES[_now.getMonth()].slice(0,3).toLowerCase()} ${_now.getFullYear()} ${_pad(_now.getHours())}:${_pad(_now.getMinutes())}`;
    const totalPages = doc.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) {
      doc.setPage(p);
      // Thin separator above the footer
      doc.setDrawColor(220,220,220); doc.setLineWidth(0.2);
      doc.line(ML, PH-9, PW-MR, PH-9);
      // Footer text
      doc.setFont("helvetica","normal"); doc.setFontSize(6.5);
      doc.setTextColor(130,130,130);
      // Left: project · version
      const leftStr = `${project || "Proyecto"} · ${activeVersion.name || ""}`;
      doc.text(leftStr, ML, PH-5);
      // Center: generated date
      doc.text(`Generado: ${genShort}`, PW/2, PH-5, {align:"center"});
      // Right: page X de Y
      doc.text(`Página ${p} de ${totalPages}`, PW-MR, PH-5, {align:"right"});
    }

    // ── SAVE — readable filename like "Mi Película - Versión 1 - 04 may 2026.pdf" ──
    const safeName = s => String(s||"").replace(/[\/\\:*?"<>|]/g, "").trim() || "Proyecto";
    const fileDate = `${_pad(_now.getDate())} ${MONTH_NAMES[_now.getMonth()].slice(0,3).toLowerCase()} ${_now.getFullYear()}`;
    doc.save(`${safeName(project)} - ${safeName(activeVersion.name)} - ${fileDate}.pdf`);
  }


  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"var(--bg-3)",position:"relative",overflow:"hidden"}}>

      {/* HEADER */}
      <div style={{display:"flex",alignItems:"center",padding:"0 12px",height:48,background:"var(--bg-1)",borderBottom:bdr,flexShrink:0,gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,background:"var(--t-1)",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:"var(--bg-1)"}}>▶</div>
          <span style={{fontSize:14,fontWeight:500,color:"var(--t-1)"}}>Stripboard</span>
        </div>
        <div style={{width:1,height:20,background:"var(--b-2)"}}/>
        {editPrj ? (
          <input autoFocus value={project}
            onChange={e=>setProject(e.target.value)}
            onBlur={()=>setEditPrj(false)}
            onKeyDown={e=>e.key==="Enter"&&setEditPrj(false)}
            style={{background:"transparent",border:"none",borderBottom:"1px solid var(--b-2)",color:"var(--t-1)",fontSize:13,outline:"none",width:200,fontFamily:"var(--font-sans)"}}/>
        ) : (
          <span onClick={()=>setEditPrj(true)} title="Click para renombrar" style={{color:"var(--t-2)",fontSize:13,cursor:"pointer"}}>{project}</span>
        )}

        {/* Version pill */}
        <div style={{width:1,height:20,background:"var(--b-2)"}}/>
        <button onClick={()=>setShowVersionsModal(true)}
          title="Gestionar versiones del plan de rodaje"
          style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",cursor:"pointer",
            background:"var(--bg-2)",border:bdrSec,borderRadius:"var(--r-md)",
            color:"var(--t-1)",fontSize:12}}>
          <span style={{fontSize:11,opacity:0.6}}>plan</span>
          <span style={{fontWeight:600}}>{activeVersion.name}</span>
          <span style={{fontSize:10,opacity:0.5,marginLeft:2}}>▾</span>
        </button>

        <div style={{flex:1}}/>

        <button className="icon-btn" onClick={exportProject} title="Guardar proyecto como archivo .json">↓</button>
        <label className="icon-btn" title="Cargar proyecto desde archivo .json" style={{cursor:"pointer"}}>↑
          <input type="file" accept=".json,application/json" onChange={importProject} style={{display:"none"}}/>
        </label>
        <button onClick={()=>setShowProjectsModal(true)}
          style={{fontSize:12,padding:"6px 12px",cursor:"pointer",background:"var(--bg-2)",border:bdrSec,borderRadius:"var(--r-md)",color:"var(--t-1)",display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:14}}>📁</span> Proyectos
        </button>

        <div style={{width:1,height:20,background:"var(--b-2)"}}/>

        {/* Boneyard toggle — only visible on Stripboard tab and when sidebar is hidden */}
        {tab === "stripboard" && !showBoneyard && (
          <button onClick={()=>setShowBoneyard(true)}
            title="Mostrar panel boneyard"
            style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",cursor:"pointer",
              background:"var(--bg-2)",border:bdrSec,borderRadius:"var(--r-md)",
              color:"var(--t-1)",fontSize:12}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 7.5V6a2 2 0 0 0-2-2h-4l-2-2H8L6 4H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h7"/>
              <path d="M16 19h6"/><path d="M19 16v6"/>
            </svg>
            <span>Boneyard</span>
            {stats.bone > 0 && <span style={{background:"#D97706",color:"#fff",borderRadius:8,fontSize:10,padding:"0 5px",fontWeight:700,minWidth:16,textAlign:"center"}}>{stats.bone}</span>}
          </button>
        )}

        <nav style={{display:"flex",gap:2}}>
          {[["stripboard","Stripboard"],["desglose","Desglose"],["elementos","Elementos"],["calendario","Calendario"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)}
              style={{padding:"5px 12px",fontSize:12,cursor:"pointer",border:"none",borderRadius:"var(--r-md)",
                background:tab===k?"var(--bg-2)":"transparent",
                color:tab===k?"var(--t-1)":"var(--t-2)",
                fontWeight:tab===k?500:400}}>
              {l}
            </button>
          ))}
        </nav>
      </div>

                                    {jornadaInfo.monthStr}
                                  </div>

                              </>
                            )}
                          </div>
                        );
                      })()}
                      <div style={{flex:1,minWidth:0}}>

                        </div>

                      </div>
                      <div style={{
                        width:50,height:50,borderRadius:5,

                        {previewCol.abbr}

                    </div>

                    {/* Row 3: location + set — with autocomplete from existing values */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                      {[
                        { field:"location", label:"LOCACIÓN", placeholder:"Ej: Casa Pedro" },
                        { field:"set",      label:"SET",      placeholder:"Ej: Cocina, Sala" }
                      ].map(({field, label, placeholder}) => {
                        const currentVal = currentScene[field] || "";
                        const valLower = currentVal.trim().toLowerCase();
                        const allVals = [...new Set(
                          Object.values(scenes)
                            .filter(sc => sc.id !== currentScene.id)
                            .map(sc => (sc[field] || "").trim())
                            .filter(Boolean)
                        )].sort();
                        const sortedVals = field === "set" && currentScene.location
                          ? [
                              ...allVals.filter(v => Object.values(scenes).some(sc =>
                                sc.location === currentScene.location && sc.set === v && sc.id !== currentScene.id
                              )),
                              ...allVals.filter(v => !Object.values(scenes).some(sc =>
                                sc.location === currentScene.location && sc.set === v && sc.id !== currentScene.id
                              ))
                            ]
                          : allVals;
                        const suggestions = valLower
                          ? sortedVals.filter(v =>
                              v.toLowerCase().startsWith(valLower) &&
                              v.toLowerCase() !== valLower
                            ).slice(0, 7)
                          : [];
                        const isFocused = focusedLocSet === field;
                        const showDropdown = isFocused && suggestions.length > 0;
                        return (
                          <div key={field}>
                            <label style={labelSt}>{label}</label>
                            <input
                              value={currentVal}
                              onChange={e=>{ updateScene(currentScene.id,{[field]:e.target.value}); setLocSetHighlight(0); }}
                              onFocus={e=>{
                                const r = e.target.getBoundingClientRect();
                                setLocSetDropdownRect({top: r.bottom+4, left: r.left, width: r.width});
                                setFocusedLocSet(field);
                                setLocSetHighlight(0);
                              }}
                              onBlur={()=>setTimeout(()=>setFocusedLocSet(f=>f===field?null:f), 150)}
                              onKeyDown={e=>{
                                if (showDropdown) {
                                  if (e.key === "ArrowDown") { e.preventDefault(); setLocSetHighlight(i=>Math.min(i+1,suggestions.length-1)); return; }
                                  if (e.key === "ArrowUp")   { e.preventDefault(); setLocSetHighlight(i=>Math.max(i-1,0)); return; }
                                  if (e.key === "Tab" || e.key === "Enter") {
                                    e.preventDefault();
                                    updateScene(currentScene.id,{[field]: suggestions[locSetHighlight]});
                                    setFocusedLocSet(null);
                                    return;
                                  }
                                  if (e.key === "Escape") { setFocusedLocSet(null); return; }
                                }
                              }}
                              style={{...inputStBold,fontSize:13}}
                              placeholder={placeholder}
                              autoComplete="off"

                                left: locSetDropdownRect.left,

                            >
                              <div

                                  display:"flex",
                                  alignItems:"center",

                                  fontWeight:700,
                                  marginBottom:16,

                                  lineHeight:1.5

                                <div style={{
                                  minWidth:32,
                                  height:22,
                                  borderRadius:6,
                                  background:"#E5E7EB",
                                  color:"#222",
                                  display:"flex",
                                  alignItems:"center",
                                  justifyContent:"center",
                                  fontSize:11,
                                  fontWeight:800
                                }}>

                                  {sceneItem.heading || `${sceneItem.intExt}. ${sceneItem.location}${sceneItem.set ? ` / ${sceneItem.set}` : ""}`}

                              </div>

                                sceneItem.script.map((block,idx)=>{

                                  if (t.includes("character")) {
                                    return (
                                      <div
                                        key={idx}
                                        onMouseUp={(e)=>handleScriptSelection(e, sceneItem.id, idx, block.text)}
                                        style={{
                                          userSelect:"text",
                                          cursor:"text",
                                          textAlign:"center",
                                        marginTop:14,
                                        marginBottom:3,
                                        fontWeight:700,
                                        letterSpacing:0.4,
                                        fontSize:12
                                      }}>
                                        {renderHighlightedText(sceneItem.id, idx, block.text)}
                                      </div>
                                    );
                                  }

                                  if (t.includes("dialog")) {
                                    return (
                                      <div
                                        key={idx}
                                        onMouseUp={(e)=>handleScriptSelection(e, sceneItem.id, idx, block.text)}
                                        style={{
                                          userSelect:"text",
                                          cursor:"text",
                                          margin:"0 auto 10px auto",
                                        width:"58%",
                                        lineHeight:1.45,
                                        fontSize:12
                                      }}>
                                        {renderHighlightedText(sceneItem.id, idx, block.text)}
                                      </div>
                                    );
                                  }

                                  if (t.includes("parenthetical")) {
                                    return (
                                      <div
                                        key={idx}
                                        onMouseUp={(e)=>handleScriptSelection(e, sceneItem.id, idx, block.text)}
                                        style={{
                                          userSelect:"text",
                                          cursor:"text",
                                          margin:"0 auto 5px auto",
                                        width:"50%",

                                  return (
                                    <div

                                      style={{
                                        userSelect:"text",
                                        cursor:"text",
                                        marginBottom:10,
                                      lineHeight:1.5,
                                      fontSize:12,
                                      whiteSpace:"pre-wrap"

                                  color:"#777",

                                  fontStyle:"italic"

                                </div>

                            </div>
                          );

                    ) : (
                      <div style={{
                        color:"#666",
                        fontSize:14,

                            color:"#222"

                            {currentScene.name}

                        <div style={{marginTop:16,fontSize:12}}>
                          Si el problema continúa, el FDX probablemente usa una estructura distinta de párrafos.
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            ) : (
              <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--t-3)",fontSize:13}}>
                Crea tu primera escena para comenzar el desglose
              </div>
            )}
          </div>
        )}

        {tab==="elementos" && (
          <div style={{display:"flex",height:"100%",overflow:"hidden"}}>
            <div style={{width:168,borderRight:bdr,overflowY:"auto",flexShrink:0,background:"var(--bg-2)"}}>
              {/* Virtual categories first — built from scene fields, not editable */}
              {VIRTUAL_CATEGORIES.map(cat => {
                const count=(allElements[cat]||[]).length;
                const active=activeCat===cat;
                return (
                  <div key={cat} onClick={()=>setActiveCat(cat)}
                    style={{padding:"8px 14px",cursor:"pointer",background:active?"var(--bg-1)":"transparent",borderLeft:active?"2px solid var(--t-1)":"2px solid transparent",transition:"all 0.1s"}}
                    title="Categoría automática — se llena desde los campos de cada escena">
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{color:"var(--t-3)",flexShrink:0}}>
                        <path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/>
                      </svg>
                      <div style={{fontSize:12,fontFamily:"var(--font-mono)",letterSpacing:0.5,color:active?"var(--t-1)":"var(--t-2)"}}>{cat}</div>
                    </div>
                    {count>0&&<div style={{fontSize:11,color:"var(--t-3)",marginTop:2,marginLeft:15}}>{count} elemento{count!==1?"s":""}</div>}
                  </div>
                );
              })}
              {/* Subtle divider */}
              <div style={{height:1,background:"var(--b-2)",margin:"4px 8px"}}/>
              {/* User-managed categories */}
              {categories.map(cat=>{
                const count=(allElements[cat]||[]).length;
                const active=activeCat===cat;
                return (
                  <div key={cat} onClick={()=>setActiveCat(cat)}
                    style={{padding:"8px 14px",cursor:"pointer",background:active?"var(--bg-1)":"transparent",borderLeft:active?"2px solid var(--t-1)":"2px solid transparent",transition:"all 0.1s"}}>
                    <div style={{fontSize:12,fontFamily:"var(--font-mono)",letterSpacing:0.5,color:active?"var(--t-1)":"var(--t-2)"}}>{cat}</div>
                    {count>0&&<div style={{fontSize:11,color:"var(--t-3)",marginTop:2}}>{count} elemento{count!==1?"s":""}</div>}
                  </div>
                );
              })}
              {/* "+ Nueva categoría" entry in the side list */}
              <div onClick={()=>{
                const name = prompt("Nombre de la nueva categoría:", "");
                if (name !== null) addCategory(name);
              }}
                style={{padding:"8px 14px",cursor:"pointer",borderLeft:"2px solid transparent",
                  display:"flex",alignItems:"center",gap:6,
                  color:"var(--t-3)",fontSize:12,fontFamily:"var(--font-mono)",letterSpacing:0.5,
                  transition:"all 0.1s"}}
                onMouseEnter={e=>e.currentTarget.style.color="var(--t-1)"}
                onMouseLeave={e=>e.currentTarget.style.color="var(--t-3)"}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"/>
                  <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                NUEVA CATEGORÍA
              </div>
            </div>
            <div style={{flex:1,padding:20,overflowY:"auto"}}>

              {/* ── Header row ── */}
              <div style={{display:"flex",alignItems:"center",gap:10,margin:"0 0 16px"}}>
                <h2 style={{margin:0,fontSize:18,fontWeight:500,color:"var(--t-1)",flex:1}}>{activeCat}</h2>
                {VIRTUAL_CATEGORIES.includes(activeCat) && (
                  <span title="Categoría automática — se llena desde los campos de cada escena"
                    style={{fontSize:10,color:"var(--t-3)",fontFamily:"var(--font-sans)",
                      padding:"3px 8px",background:"var(--bg-2)",border:bdrSec,borderRadius:"var(--r-md)"}}>
                    Automática
                  </span>
                )}
                {activeCat !== "CAST" && categories.includes(activeCat) && !VIRTUAL_CATEGORIES.includes(activeCat) && (
                  <>
                    <button onClick={()=>{
                      const newName = prompt(`Renombrar la categoría "${activeCat}" a:`, activeCat);
                      if (newName !== null) renameCategory(activeCat, newName);
                    }}
                      title="Renombrar categoría"
                      style={{background:"var(--bg-2)",border:bdrSec,color:"var(--t-2)",cursor:"pointer",
                        padding:"4px 8px",borderRadius:"var(--r-md)",fontSize:11,
                        display:"inline-flex",alignItems:"center",gap:5}}>
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                      </svg>
                      Renombrar
                    </button>
                    <button onClick={()=>deleteCategory(activeCat)}
                      title="Eliminar categoría"
                      style={{background:"var(--bg-2)",border:bdrSec,color:"var(--t-2)",cursor:"pointer",
                        padding:"4px 8px",borderRadius:"var(--r-md)",fontSize:11,
                        display:"inline-flex",alignItems:"center",gap:5}}>
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                        <path d="M10 11v6M14 11v6"/>
                        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                      </svg>
                      Eliminar
                    </button>
                  </>
                )}
              </div>

              {/* ── LOCACIONES: two-level tree (Locación → Sets → Escenas) ── */}
              {activeCat === "LOCACIONES" && (() => {
                // Build: { "Casa Juan": { sets: ["Cocina","Sala"], scenes: [sc,...] }, ... }
                const locMap = {};
                Object.values(scenes).forEach(sc => {
                  if (!sc.location) return;
                  if (!locMap[sc.location]) locMap[sc.location] = { sets: {}, noSet: [] };
                  const setName = (sc.set || "").trim();
                  if (setName) {
                    if (!locMap[sc.location].sets[setName]) locMap[sc.location].sets[setName] = [];
                    locMap[sc.location].sets[setName].push(sc);
                  } else {
                    locMap[sc.location].noSet.push(sc);
                  }
                });
                const locNames = Object.keys(locMap).sort();
                if (locNames.length === 0)
                  return <p style={{color:"var(--t-3)",fontSize:13}}>No hay locaciones registradas. Completá el campo "Locación" en el desglose de cada escena.</p>;

                return (
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {locNames.map(loc => {
                      const data = locMap[loc];
                      const setNames = Object.keys(data.sets).sort();
                      const totalScenes = Object.values(data.sets).flat().length + data.noSet.length;
                      const isOpen = expandedLocs[loc] !== false; // default open
                      const toggleOpen = () => setExpandedLocs(prev => ({...prev, [loc]: !isOpen}));

                      return (
                        <div key={loc} style={{background:"var(--bg-1)",border:bdr,borderRadius:"var(--r-lg)",overflow:"hidden"}}>

                          {/* Locación header — clickable to expand/collapse */}
                          <div onClick={toggleOpen}
                            style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
                              cursor:"pointer",userSelect:"none",
                              background: isOpen ? "var(--bg-1)" : "var(--bg-2)",
                              borderBottom: isOpen ? bdr : "none",
                              transition:"background 0.12s"}}>
                            {/* Chevron */}
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                              strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"
                              style={{color:"var(--t-3)",transition:"transform 0.15s",
                                transform: isOpen ? "rotate(90deg)" : "rotate(0deg)", flexShrink:0}}>
                              <polyline points="9 18 15 12 9 6"/>
                            </svg>
                            {/* Pin icon */}
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                              strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                              style={{color:"var(--t-2)",flexShrink:0}}>
                              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                              <circle cx="12" cy="10" r="3"/>
                            </svg>
                            <span style={{fontSize:14,fontWeight:500,color:"var(--t-1)",flex:1}}>{loc}</span>
                            {/* Counters */}
                            <span style={{fontSize:11,color:"var(--t-3)",fontFamily:"var(--font-mono)",whiteSpace:"nowrap"}}>
                              {setNames.length > 0 && `${setNames.length} set${setNames.length!==1?"s":""} · `}
                              {totalScenes} esc.
                            </span>
                          </div>

                          {/* Body: sets + scenes */}
                          {isOpen && (
                            <div style={{padding:"8px 14px 12px",display:"flex",flexDirection:"column",gap:10}}>

                              {/* Sets with their scenes */}
                              {setNames.map(setName => {
                                const setScenes = data.sets[setName];
                                return (
                                  <div key={setName}>
                                    {/* Set label */}
                                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                                        style={{color:"var(--t-3)",flexShrink:0}}>
                                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                                        <polyline points="9 22 9 12 15 12 15 22"/>
                                      </svg>
                                      <span style={{fontSize:12,fontWeight:500,color:"var(--t-2)",fontFamily:"var(--font-mono)",letterSpacing:0.5}}>
                                        {setName}
                                      </span>
                                      <span style={{fontSize:11,color:"var(--t-3)",marginLeft:2}}>{setScenes.length} esc.</span>
                                    </div>
                                    {/* Scene chips */}
                                    <div style={{display:"flex",flexWrap:"wrap",gap:4,paddingLeft:17}}>
                                      {setScenes
                                        .slice().sort((a,b)=> (+a.num||0)-(+b.num||0))
                                        .map(sc => (
                                          <span key={sc.id} onClick={()=>{ openEdit(sc.id); setTab("desglose"); }}
                                            title={`Esc. ${sc.num} — ${sc.name || ""}\nClick para abrir en desglose`}
                                            style={{background:"var(--bg-2)",color:"var(--t-2)",fontSize:11,
                                              padding:"2px 8px",borderRadius:4,fontFamily:"var(--font-mono)",
                                              border:bdr,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:4}}>
                                            <span style={{fontWeight:600,color:"var(--t-1)"}}>{sc.num}</span>
                                            {sc.name && <span style={{opacity:0.75,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sc.name.split('\n')[0]}</span>}
                                          </span>
                                        ))
                                      }
                                    </div>
                                  </div>
                                );
                              })}

                              {/* Scenes without a set */}
                              {data.noSet.length > 0 && (
                                <div>
                                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                                    <span style={{fontSize:11,color:"var(--t-3)",fontFamily:"var(--font-mono)",letterSpacing:0.5,fontStyle:"italic"}}>
                                      sin set específico
                                    </span>
                                  </div>
                                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                                    {data.noSet
                                      .slice().sort((a,b)=>(+a.num||0)-(+b.num||0))
                                      .map(sc => (
                                        <span key={sc.id} onClick={()=>{ openEdit(sc.id); setTab("desglose"); }}
                                          title={`Esc. ${sc.num} — ${sc.name || ""}`}
                                          style={{background:"var(--bg-2)",color:"var(--t-2)",fontSize:11,
                                            padding:"2px 8px",borderRadius:4,fontFamily:"var(--font-mono)",
                                            border:bdr,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:4}}>
                                          <span style={{fontWeight:600,color:"var(--t-1)"}}>{sc.num}</span>
                                          {sc.name && <span style={{opacity:0.75,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sc.name.split('\n')[0]}</span>}
                                        </span>
                                      ))
                                    }
                                  </div>
                                </div>
                              )}

                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })()}

              {/* ── All other categories (standard flat list) ── */}
              {!VIRTUAL_CATEGORIES.includes(activeCat) && (
                <>
                  {(allElements[activeCat]||[]).length===0 ? (
                    <p style={{color:"var(--t-3)",fontSize:13}}>No hay elementos en esta categoría.</p>
                  ) : (
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {(allElements[activeCat]||[]).map(item=>{
                        const usedIn = Object.values(scenes).filter(sc => {
                          if (activeCat === "CAST") {
                            const all = [...(sc.cast||[]), ...(sc.elements?.CAST||[])];
                            return all.some(r => normalizeElementRead("CAST", r) === item);
                          }
                          return (sc.elements?.[activeCat]||[]).some(r => normalizeElementRead(activeCat, r) === item);
                        });
                        return (
                          <div key={item} style={{background:"var(--bg-1)",border:bdr,borderRadius:"var(--r-md)",padding:"10px 14px"}}>
                            <div style={{fontSize:14,fontWeight:500,color:"var(--t-1)"}}>{item}</div>

                                <span key={sc.id} onClick={()=>{ openEdit(sc.id); setTab("desglose"); }}
